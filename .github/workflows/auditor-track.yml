name: Track PR Status

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours (was daily — bumped for ~50 PRs/day cadence)
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: write  # needed to dispatch auditor-case-study.yml (GITHUB_TOKEN label events don't trigger other workflows)

concurrency:
  group: nlpm-track
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          persist-credentials: false

      - name: Check submitted PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Outcome detection patterns. Case-insensitive grep.
          # "applied_separately" = PR closed unmerged, but maintainer comment indicates fix was applied
          APPLIED_PATTERNS='applied in|applied directly|applied to|applied as|merged into|fixed in release|fixed in v|fixed on main|included in|will be in|already in|already fixed'
          # "rule_adopted" = maintainer opened a hardening/backfill PR that goes beyond our scope
          ADOPTION_PATTERNS='(hardening|backfill|backfilling|sibling).*#[0-9]+|CHANGELOG.*NLPM|CHANGELOG.*audit'

          jq -c '.repos | to_entries[] | select(.value.status == "contributed" or .value.status == "tracked")' auditor/registry/repos.json | while read -r entry; do
            REPO=$(echo "$entry" | jq -r '.key')
            ISSUE_NUM=$(echo "$entry" | jq -r '.value.audit_issue')
            echo "Checking PRs for $REPO..."

            # Query only PRs we created (stored in pipeline_prs)
            PR_NUMS=$(echo "$entry" | jq -r '.value.pipeline_prs // [] | .[]')
            PRS="[]"
            RULE_ADOPTED="false"
            if [ -n "$PR_NUMS" ]; then
              ITEMS="[]"
              for pr_num in $PR_NUMS; do
                PR_DATA=$(gh pr view "$pr_num" --repo "$REPO" \
                  --json number,state,mergedAt,closedAt,title 2>/dev/null || echo "")
                if [ -z "$PR_DATA" ]; then
                  sleep 0.5
                  continue
                fi

                RAW_STATE=$(echo "$PR_DATA" | jq -r '.state')
                MERGED_AT=$(echo "$PR_DATA" | jq -r '.mergedAt // ""')

                # Classify outcome. Default: whatever the raw state says.
                OUTCOME=""
                if [ -n "$MERGED_AT" ] && [ "$MERGED_AT" != "null" ]; then
                  OUTCOME="merged"
                elif [ "$RAW_STATE" = "OPEN" ]; then
                  OUTCOME="open"
                elif [ "$RAW_STATE" = "CLOSED" ]; then
                  # Closed and not merged — check maintainer comments for "applied separately" signal
                  COMMENTS=$(gh api "repos/$REPO/issues/$pr_num/comments" \
                    --jq '[.[] | select(.user.type != "Bot") | .body] | join("\n")' 2>/dev/null || echo "")
                  if [ -n "$COMMENTS" ] && echo "$COMMENTS" | grep -qiE "$APPLIED_PATTERNS"; then
                    OUTCOME="applied_separately"
                  else
                    OUTCOME="rejected"
                  fi
                  # Check for rule-adoption signal while we have the comments
                  if [ -n "$COMMENTS" ] && echo "$COMMENTS" | grep -qiE "$ADOPTION_PATTERNS"; then
                    RULE_ADOPTED="true"
                  fi
                fi

                # Also check merged PRs for rule-adoption comments
                if [ "$OUTCOME" = "merged" ] && [ "$RULE_ADOPTED" = "false" ]; then
                  COMMENTS=$(gh api "repos/$REPO/issues/$pr_num/comments" \
                    --jq '[.[] | select(.user.type != "Bot") | .body] | join("\n")' 2>/dev/null || echo "")
                  if [ -n "$COMMENTS" ] && echo "$COMMENTS" | grep -qiE "$ADOPTION_PATTERNS"; then
                    RULE_ADOPTED="true"
                  fi
                fi

                ITEMS=$(echo "$ITEMS" | jq --argjson pr "$PR_DATA" --arg outcome "$OUTCOME" \
                  '. + [$pr + {outcome: $outcome}]')
                sleep 0.5
              done
              PRS="$ITEMS"
            fi

            MERGED=$(echo "$PRS" | jq '[.[] | select(.outcome == "merged")] | length')
            APPLIED=$(echo "$PRS" | jq '[.[] | select(.outcome == "applied_separately")] | length')
            REJECTED=$(echo "$PRS" | jq '[.[] | select(.outcome == "rejected")] | length')
            OPEN=$(echo "$PRS" | jq '[.[] | select(.outcome == "open")] | length')
            CLOSED=$((APPLIED + REJECTED))
            echo "  $MERGED merged, $APPLIED applied-separately, $REJECTED rejected, $OPEN open (rule_adopted=$RULE_ADOPTED)"

            jq --arg name "$REPO" --argjson prs "$PRS" --argjson rule_adopted "$RULE_ADOPTED" \
               '.repos[$name].prs = $prs | .repos[$name].rule_adopted = $rule_adopted' \
               auditor/registry/repos.json > /tmp/reg.json && mv /tmp/reg.json auditor/registry/repos.json

            if [ "$OPEN" -eq 0 ] && [ "$(echo "$PRS" | jq length)" -gt 0 ]; then
              jq --arg name "$REPO" '.repos[$name].status = "tracked"' \
                 auditor/registry/repos.json > /tmp/reg.json && mv /tmp/reg.json auditor/registry/repos.json

              # A repo qualifies for a case study if any fix landed — either merged
              # directly or applied separately by the maintainer after closing the PR.
              ACCEPTED=$((MERGED + APPLIED))
              if [ "$ACCEPTED" -gt 0 ]; then
                jq --arg name "$REPO" '.repos[$name].case_study_candidate = true' \
                   auditor/registry/repos.json > /tmp/reg.json && mv /tmp/reg.json auditor/registry/repos.json

                if [ "$ISSUE_NUM" != "null" ] && [ "$ISSUE_NUM" != "0" ]; then
                  gh issue comment "$ISSUE_NUM" \
                    --body "All PRs resolved. $MERGED merged, $APPLIED applied-separately, $REJECTED rejected. Ready for case study." \
                    2>/dev/null || true
                  gh issue edit "$ISSUE_NUM" --add-label "case-study-ready" 2>/dev/null || true
                  # GITHUB_TOKEN label events don't trigger other workflows (anti-recursion).
                  # Dispatch the case study workflow explicitly, same pattern as batch-processor.
                  gh workflow run auditor-case-study.yml \
                    -f repo="$REPO" \
                    -f issue_number="$ISSUE_NUM" 2>/dev/null || echo "WARNING: failed to dispatch case study for $REPO"
                fi
              fi
            fi
          done

      - name: Log and commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source auditor/scripts/log-event.sh

          CONTRIBUTED=$(jq '[.repos | to_entries[] | select(.value.status == "contributed")] | length' auditor/registry/repos.json)
          TRACKED=$(jq '[.repos | to_entries[] | select(.value.status == "tracked")] | length' auditor/registry/repos.json)
          CASE_READY=$(jq '[.repos | to_entries[] | select(.value.case_study_candidate == true)] | length' auditor/registry/repos.json)
          RULE_ADOPTED=$(jq '[.repos | to_entries[] | select(.value.rule_adopted == true)] | length' auditor/registry/repos.json)

          log_event "track" "status_check" "{\"contributed\": $CONTRIBUTED, \"tracked\": $TRACKED, \"case_study_ready\": $CASE_READY, \"rule_adopted\": $RULE_ADOPTED}"

          git config user.name "nlpm-auditor[bot]"
          git config user.email "nlpm-auditor[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add auditor/registry/repos.json auditor/logs/events.jsonl
          bash auditor/scripts/guard-protected-paths.sh || exit 1
          git diff --cached --quiet || {
            git commit -m "track: $(date +%Y-%m-%d) — $TRACKED tracked, $CASE_READY case-study ready, $RULE_ADOPTED rule-adopted"
            git push
          }

name: Write Case Study

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      repo:
        description: 'Target repo (owner/name)'
        required: true
      issue_number:
        description: 'Tracking issue number'
        required: true
      force_rewrite:
        description: 'Regenerate the case study even if an article already exists (deletes the prior article + cover image first)'
        required: false
        default: 'false'
        type: string

permissions:
  contents: write
  issues: write
  id-token: write

concurrency:
  group: nlpm-case-study
  cancel-in-progress: false

jobs:
  write:
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.label.name == 'case-study-ready')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install cwebp
        # ubuntu-24.04 doesn't ship webp tools by default and PIL's WebP
        # support depends on libwebp at install time. Without this step,
        # the cover-image step's last-resort fallback writes a raw PNG
        # (typically 3MB) instead of a compressed WebP (typically
        # 250KB) — observed on the 2026-05-07 kubesphere/code-yeongyu
        # regenerations: HTTP 200, image saved, "WARN: no WebP encoder
        # — raw PNG copy". The package is small (~600KB) and apt-get is
        # fast on GitHub runners.
        # Run apt-get update first — Ubuntu runners can have stale package
        # indices, causing intermittent "Unable to locate package" failures.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends webp

      - name: Extract target
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_ISSUE: ${{ inputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "repo=$INPUT_REPO" >> "$GITHUB_OUTPUT"
            echo "issue=$INPUT_ISSUE" >> "$GITHUB_OUTPUT"
          else
            REPO=$(echo "$ISSUE_TITLE" | sed 's/Audit candidate: //')
            echo "repo=$REPO" >> "$GITHUB_OUTPUT"
            echo "issue=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Force rewrite — remove prior article + cover image
        # Dispatched-only path. When force_rewrite=true, delete any
        # existing `<date>-<slug>.md` and its cover image so the
        # downstream skipcheck sees no prior article and proceeds to
        # write a fresh one with the date-of-rewrite prefix. Without
        # this, skipcheck would bail and the workflow would no-op.
        # The final commit step stages `case-studies/` which picks up
        # both the deletion (via git add -A on the directory) and the
        # new file.
        if: github.event_name == 'workflow_dispatch' && inputs.force_rewrite == 'true'
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          REMOVED=0
          for f in case-studies/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]-"${SLUG}".md; do
            [ -f "$f" ] || continue
            rm -f "$f"
            REMOVED=$((REMOVED + 1))
            echo "Removed prior article: $f"
          done
          for f in case-studies/images/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]-"${SLUG}"-cover.webp \
                   case-studies/images/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]-"${SLUG}"-cover.png \
                   case-studies/images/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]-"${SLUG}"-cover.jpg; do
            [ -f "$f" ] || continue
            rm -f "$f"
            echo "Removed prior cover image: $f"
          done
          echo "force_rewrite cleanup: $REMOVED prior article(s) removed"

      - name: Skip if case study already exists
        id: skipcheck
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          # Any date prefix: YYYY-MM-DD-<slug>.md. Bash glob handles
          # non-alphanumeric filenames better than `ls | grep`.
          EXISTING=""
          shopt -s nullglob
          for f in case-studies/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]-"${SLUG}".md; do
            EXISTING="$(basename "$f")"
            break
          done
          shopt -u nullglob
          if [ -n "$EXISTING" ]; then
            echo "Case study already exists: case-studies/$EXISTING — skipping rewrite."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No prior case study for $TARGET_REPO — proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Gather evidence from GitHub
        if: steps.skipcheck.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          mkdir -p /tmp/evidence

          # Repo metadata
          gh api "repos/$TARGET_REPO" --jq '{
            name: .full_name, description: .description,
            stars: .stargazers_count, forks: .forks_count,
            owner_login: .owner.login, owner_type: .owner.type
          }' > /tmp/evidence/repo.json

          # Owner profile
          OWNER=$(echo "$TARGET_REPO" | cut -d/ -f1)
          gh api "users/$OWNER" --jq '{login, name, html_url}' \
            > /tmp/evidence/owner.json 2>/dev/null || echo "{}" > /tmp/evidence/owner.json

          # Our PRs and issues
          gh pr list --repo "$TARGET_REPO" --author xiaolai --state all \
            --json number,title,state,createdAt,closedAt,mergedAt,labels,url \
            > /tmp/evidence/prs.json 2>/dev/null || echo "[]" > /tmp/evidence/prs.json

          gh issue list --repo "$TARGET_REPO" --author xiaolai --state all \
            --json number,title,state,createdAt,closedAt,url \
            > /tmp/evidence/issues.json 2>/dev/null || echo "[]" > /tmp/evidence/issues.json

          # Commits mentioning NLPM or Claude co-authorship
          gh api "repos/$TARGET_REPO/commits?per_page=50" \
            --jq '[.[] | select(.commit.message | test("nlpm|NLPM|Co-Authored-By.*Claude"; "i")) | {
              sha: .sha, message: .commit.message,
              date: .commit.committer.date, url: .html_url
            }]' > /tmp/evidence/commits.json 2>/dev/null || echo "[]" > /tmp/evidence/commits.json

          # PR review comments
          jq -r '.[].number' /tmp/evidence/prs.json 2>/dev/null | while read -r pr_num; do
            gh api "repos/$TARGET_REPO/pulls/$pr_num/reviews" \
              --jq '[.[] | {user: .user.login, state: .state, body: .body}]' \
              > "/tmp/evidence/pr-${pr_num}-reviews.json" 2>/dev/null || true
            sleep 1
          done

          # Copy audit report
          REPORT="auditor/audits/${TARGET_REPO//\//-}.md"
          [ -f "$REPORT" ] && cp "$REPORT" /tmp/evidence/audit-report.md || echo "No audit report" > /tmp/evidence/audit-report.md

      # ================================================================
      # POST-MERGE RE-AUDIT: clone target at HEAD, re-score, diff
      #
      # Rationale: the original audit is frozen at the commit we first
      # audited. After the maintainer merges (or applies separately) our
      # PRs, the repo has changed. We re-score at the current HEAD and
      # diff against the original findings to produce measurable
      # before/after evidence for the case study.
      #
      # The diff emits `finding_verified` events to events.jsonl, one per
      # original finding, with an outcome of fixed_and_merged /
      # fixed_applied_separately / fixed_upstream_not_merged /
      # persists_identically / persists_line_shifted. These join to
      # findings.jsonl by fingerprint and are higher-signal than
      # `merged / contributed` for rule-health analysis — a PR merge
      # proves intent, a re-audit proves effect.
      # ================================================================
      - name: Re-audit — refresh registry + logs from main
        if: steps.skipcheck.outputs.skip != 'true'
        run: |
          # auditor-track.yml mutates registry/repos.json (prs[].outcome,
          # rule_adopted, pipeline_prs) every 4h on a separate runner, and
          # appends to events.jsonl / disagreements.jsonl. case-study.yml
          # does a checkout at step 1 and then spends several minutes in
          # GitHub evidence-gathering; by the time the diff runs, track
          # may have committed fresher PR outcomes to main that this
          # workspace hasn't seen. Fast-forwarding here lets the diff
          # classify against the latest PR state — without it, a merged PR
          # would occasionally be misattributed as fixed_upstream_not_merged.
          #
          # Safety: ff-only fails loud rather than silently rewinding if
          # prior steps somehow left local commits (they shouldn't — only
          # /tmp writes precede this). On any failure, carry on with
          # workspace-local state and log the reason; a stale registry is
          # a precision degradation, not a correctness break.
          if ! git fetch origin main --quiet 2>/dev/null; then
            echo "WARN: fetch failed — diff will use workspace-local registry state"
            exit 0
          fi
          LOCAL_HEAD=$(git rev-parse HEAD)
          REMOTE_HEAD=$(git rev-parse origin/main)
          if [ "$LOCAL_HEAD" = "$REMOTE_HEAD" ]; then
            echo "Registry refresh: already at origin/main ($REMOTE_HEAD)"
            exit 0
          fi
          if ! git merge --ff-only origin/main --quiet 2>/dev/null; then
            echo "WARN: ff-only merge failed (local commits or divergence) — diff will use workspace-local registry state"
            exit 0
          fi
          echo "Registry refresh: fast-forwarded $LOCAL_HEAD -> $REMOTE_HEAD"

      - name: Re-audit — clone target at HEAD
        if: steps.skipcheck.outputs.skip != 'true'
        id: reclone
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"

          # Precondition 1: original audit sidecar must exist. Without it,
          # we have no fingerprints to diff against — the re-audit would
          # produce a scoring snapshot but no verification signal.
          ORIG_SIDECAR="auditor/audits/${SLUG}.findings.jsonl"
          if [ ! -f "$ORIG_SIDECAR" ]; then
            echo "No original sidecar at $ORIG_SIDECAR — skipping re-audit."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=no_original_sidecar" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Precondition 2: the sidecar must have at least one finding.
          # `grep -c` returns exit 1 when zero matches — without the
          # explicit "|| true" guard, the count is never assigned and the
          # later numeric comparison breaks under set -e. Earlier form
          # (`|| echo 0`) produced "0\n0" when grep printed 0 and also
          # fired the fallback, which blew up `[ "0\n0" -eq 0 ]`.
          SIDECAR_LINES=$(grep -c '^{' "$ORIG_SIDECAR" 2>/dev/null || true)
          SIDECAR_LINES="${SIDECAR_LINES:-0}"
          if [ "$SIDECAR_LINES" -eq 0 ]; then
            echo "Original sidecar has zero findings — nothing to verify."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=no_original_findings" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Precondition 3: target repo must still be reachable and public.
          # Private / deleted / renamed repos → skip with clear reason.
          DEFAULT_BRANCH=$(gh api "repos/$TARGET_REPO" --jq '.default_branch' 2>/dev/null || echo "")
          if [ -z "$DEFAULT_BRANCH" ]; then
            echo "Cannot resolve default branch for $TARGET_REPO — skipping re-audit."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=target_unreachable" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Clean up any stale clone from the same runner — we own the
          # workspace but can't assume previous jobs cleaned up.
          rm -rf target-repo
          if ! git clone --depth 1 --branch "$DEFAULT_BRANCH" \
               "https://github.com/$TARGET_REPO.git" target-repo 2>/dev/null; then
            echo "Clone failed for $TARGET_REPO — skipping re-audit."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=clone_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMIT_SHA_AFTER=$(git -C target-repo rev-parse HEAD 2>/dev/null || echo "unknown")

          # commit_sha_before: prefer the registry (persisted by audit.yml);
          # fall back to the most recent per-repo entry in findings.jsonl;
          # last resort "unknown". Honest when we cannot tell.
          COMMIT_SHA_BEFORE=$(jq -r --arg r "$TARGET_REPO" \
            '.repos[$r].commit_sha_at_audit // "unknown"' \
            auditor/registry/repos.json 2>/dev/null || echo "unknown")
          if [ "$COMMIT_SHA_BEFORE" = "unknown" ] && [ -f auditor/findings.jsonl ]; then
            # jq's structured filter beats `grep -F "\"repo\":\"$r\""`:
            # the grep form substring-matches inside description fields
            # and collisionally against similarly-named repos (foo/bar vs
            # foo/bar-ext). A structured filter can't collide.
            COMMIT_SHA_BEFORE=$(jq -r --arg r "$TARGET_REPO" \
              'select(.repo == $r) | .commit_sha' \
              auditor/findings.jsonl 2>/dev/null | tail -1 || echo "")
            COMMIT_SHA_BEFORE="${COMMIT_SHA_BEFORE:-unknown}"
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "default_branch=$DEFAULT_BRANCH" >> "$GITHUB_OUTPUT"
          echo "commit_sha_before=$COMMIT_SHA_BEFORE" >> "$GITHUB_OUTPUT"
          echo "commit_sha_after=$COMMIT_SHA_AFTER" >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "Re-audit prep: before=$COMMIT_SHA_BEFORE after=$COMMIT_SHA_AFTER branch=$DEFAULT_BRANCH"

      - name: Re-audit — triage artifacts
        if: steps.skipcheck.outputs.skip != 'true' && steps.reclone.outputs.skip != 'true'
        id: retriage
        run: |
          cd target-repo

          # Mirror of audit.yml's triage step so the file set is the same
          # shape as the original audit. Any drift here means the re-audit
          # scores a different population of files and the diff becomes
          # meaningless.
          find . -path '*/agents/*.md' -type f > /tmp/re-artifacts-agents.txt 2>/dev/null || true
          find . -path '*/commands/*.md' -type f > /tmp/re-artifacts-commands.txt 2>/dev/null || true
          find . -name 'SKILL.md' -type f > /tmp/re-artifacts-skills.txt 2>/dev/null || true
          # Mirror of audit.yml's tightened hook-config find. See the
          # comment there: previous `*/hooks/*.json` pattern swept in
          # tsconfig.json and other unrelated .json files; restricting to
          # `*/hooks/hooks.json` matches the canonical Claude Code hook
          # config filename only.
          find . -path '*/hooks/hooks.json' -type f > /tmp/re-artifacts-hooks.txt 2>/dev/null || true
          find . -name 'CLAUDE.md' -type f > /tmp/re-artifacts-claude-md.txt 2>/dev/null || true
          find . -name 'plugin.json' -path '*/.claude-plugin/*' -type f > /tmp/re-artifacts-manifests.txt 2>/dev/null || true

          TOTAL=$(cat /tmp/re-artifacts-*.txt 2>/dev/null | wc -l | tr -d ' ')
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

          # Same MAX_FILES cap as audit.yml — keeps env size bounded for
          # large repos. Strategy is reported but unused at re-audit time:
          # the shared prompt expects a flat file list.
          MAX_FILES=100
          FILE_LIST=$(cat /tmp/re-artifacts-*.txt 2>/dev/null | head -n "$MAX_FILES")
          # `grep -c PATTERN` writes the count to stdout AND exits 1 on zero
          # matches. The previous `|| echo 0` fallback then ran *in addition*
          # to grep's `0`, so the captured value was `"0\n0"` — written to
          # $GITHUB_OUTPUT it produced two lines, the second one without a
          # `key=` prefix → "Invalid format '0'" runner error and the
          # case-study workflow died at this step. Observed concretely on
          # safishamsi/graphify after PR #603 merged: graphify's default
          # branch transitioned v3 → v6 between audit and re-audit, so the
          # original audited file paths exist in zero of the v6 tree, the
          # find pipeline returns empty, $FILE_LIST is empty, and grep -c
          # hits the zero-match path. Fix: suppress grep's failure exit so
          # only its stdout count survives, then default empty → 0.
          AUDITED_COUNT=$(printf '%s\n' "$FILE_LIST" | grep -c '.' 2>/dev/null || true)
          AUDITED_COUNT=${AUDITED_COUNT:-0}
          echo "audited_count=$AUDITED_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$TOTAL" -le 20 ]; then STRATEGY="single";
          elif [ "$TOTAL" -le 60 ]; then STRATEGY="batched";
          else STRATEGY="progressive"; fi
          echo "strategy=$STRATEGY" >> "$GITHUB_OUTPUT"

          echo "RE_AUDIT_FILE_LIST<<FILELIST_DELIM" >> "$GITHUB_ENV"
          echo "$FILE_LIST" >> "$GITHUB_ENV"
          echo "FILELIST_DELIM" >> "$GITHUB_ENV"

          echo "Re-audit triage: $AUDITED_COUNT files to re-score ($STRATEGY)"

      - name: Re-audit — render shared scoring prompt
        if: steps.skipcheck.outputs.skip != 'true' && steps.reclone.outputs.skip != 'true'
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
          SLUG: ${{ steps.reclone.outputs.slug }}
          STRATEGY: ${{ steps.retriage.outputs.strategy }}
          ARTIFACT_COUNT: ${{ steps.retriage.outputs.audited_count }}
          RE_AUDIT_FILE_LIST: ${{ env.RE_AUDIT_FILE_LIST }}
        run: |
          DATE_ISO=$(date -u +%Y-%m-%d)
          REPORT_PATH="auditor/audits/${SLUG}.re-audit.md"
          SIDECAR_PATH="auditor/audits/${SLUG}.re-audit.findings.jsonl"
          mkdir -p auditor/audits

          # Clear any stale re-audit outputs from a previous run — Claude
          # must emit fresh files, not edit prior ones.
          rm -f "$REPORT_PATH" "$SIDECAR_PATH"

          # Render the shared prompt template by substituting tokens.
          # The template lives at auditor/prompts/score-artifacts.md and is
          # shared contract with audit.yml (JSONL sidecar schema). File
          # list is multi-line so we use python for substitution — sed on
          # multi-line input is fragile.
          python3 <<PYEOF
          from pathlib import Path
          template = Path("auditor/prompts/score-artifacts.md").read_text()
          replacements = {
              "{{TARGET_REPO}}": "${TARGET_REPO}",
              "{{CLONE_DIR}}": "target-repo",
              "{{FILE_LIST}}": """${RE_AUDIT_FILE_LIST}""",
              "{{REPORT_PATH}}": "${REPORT_PATH}",
              "{{SIDECAR_PATH}}": "${SIDECAR_PATH}",
              "{{REPORT_TITLE}}": "NLPM Re-Audit: ${TARGET_REPO}",
              "{{DATE_ISO}}": "${DATE_ISO}",
              "{{ARTIFACT_COUNT}}": "${ARTIFACT_COUNT}",
              "{{STRATEGY}}": "${STRATEGY}",
              "{{MODE}}": "re-audit",
          }
          for k, v in replacements.items():
              template = template.replace(k, v)
          Path("/tmp/re-audit-prompt.md").write_text(template)
          print(f"Rendered re-audit prompt: {len(template)} bytes")
          PYEOF

      - name: Re-audit — score with Claude Code
        id: rescore
        if: steps.skipcheck.outputs.skip != 'true' && steps.reclone.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "github-actions[bot],nlpm-auditor[bot]"
          show_full_output: true
          prompt: "Read the prompt file at /tmp/re-audit-prompt.md and follow all instructions in it."
          claude_args: "--allowedTools Read,Glob,Grep,Write"

      - name: Re-audit — extract scores, diff, emit events
        # Gated on rescore.outcome == 'success' AND rescore actually emitted a
        # report file. Without this guard, a failed Claude run left an empty
        # sidecar behind which the diff classified as "all findings
        # fixed_upstream_not_merged", flooding events.jsonl with false
        # finding_verified records and corrupting rule-health metrics.
        # continue-on-error on rescore lets downstream housekeeping run even
        # when the scoring call itself failed.
        if: steps.skipcheck.outputs.skip != 'true' && steps.reclone.outputs.skip != 'true' && steps.rescore.outcome == 'success'
        id: rediff
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
          SLUG: ${{ steps.reclone.outputs.slug }}
          COMMIT_SHA_BEFORE: ${{ steps.reclone.outputs.commit_sha_before }}
          COMMIT_SHA_AFTER: ${{ steps.reclone.outputs.commit_sha_after }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          ORIG_REPORT="auditor/audits/${SLUG}.md"
          ORIG_SIDECAR="auditor/audits/${SLUG}.findings.jsonl"
          RE_REPORT="auditor/audits/${SLUG}.re-audit.md"
          RE_SIDECAR="auditor/audits/${SLUG}.re-audit.findings.jsonl"
          DIFF_REPORT="auditor/audits/${SLUG}.re-audit.diff.md"
          SUMMARY="/tmp/re-audit-summary.json"

          # Inner precondition, belt-and-suspenders beyond the step-level
          # rescore.outcome gate: require the re-audit REPORT to exist.
          # The shared prompt instructs Claude to write the report (Step 2)
          # before the sidecar (Step 3). An existing report proves Claude
          # ran the scoring logic; an absent one means the action silently
          # produced nothing (timeout, prompt echo, auth flap).
          if [ ! -f "$RE_REPORT" ]; then
            echo "Re-audit report missing at $RE_REPORT — scoring did not complete."
            echo "Skipping diff + event emission. Case study will run in skip mode."
            echo '{"skipped": true, "reason": "rescore_produced_no_report"}' > /tmp/evidence/re-audit-summary.json
            echo "Re-audit skipped — scoring step produced no report." > /tmp/evidence/re-audit-report.md
            echo "Re-audit skipped — scoring step produced no report." > /tmp/evidence/re-audit-diff.md
            exit 0
          fi

          # Sidecar may be legitimately absent if the re-scoring found no
          # findings. Empty sidecar is the "perfectly clean" result — all
          # original findings should surface as fixed via the diff.
          if [ ! -f "$RE_SIDECAR" ]; then
            echo "Re-audit sidecar missing at $RE_SIDECAR (report present); creating empty file."
            touch "$RE_SIDECAR"
          fi

          # Anchor to the `**NL Score**:` label rather than matching any
          # `N/100` in the report body. Without the anchor, a sentence
          # like "78/100 lines passed" earlier in the doc would be
          # picked up as the score. Accepts the literal label and an
          # optional `<...>` placeholder (the shared prompt template).
          extract_score() {
            local report="$1"
            [ -f "$report" ] || { echo ""; return; }
            grep -oE '\*\*NL Score\*\*:[[:space:]]*[0-9]+/100' "$report" \
              | head -1 \
              | grep -oE '[0-9]+' | head -1
          }

          # Use bash arrays for the optional --original-score / --reaudit-score
          # flags so we can safely quote everything. The previous string-based
          # approach forced unquoted expansion to split "--flag N" into two
          # args, which shellcheck flagged (SC2086) as a real risk under
          # filenames-with-spaces. Arrays sidestep both concerns.
          ORIG_SCORE_ARG=()
          ORIG_SCORE=$(extract_score "$ORIG_REPORT")
          [ -n "$ORIG_SCORE" ] && ORIG_SCORE_ARG=(--original-score "$ORIG_SCORE")

          RE_SCORE_ARG=()
          RE_SCORE=$(extract_score "$RE_REPORT")
          [ -n "$RE_SCORE" ] && RE_SCORE_ARG=(--reaudit-score "$RE_SCORE")

          # Run the diff. It tolerates missing files, malformed lines, and
          # an empty registry — produces an honest summary even when the
          # pipeline is only partly populated.
          python3 auditor/scripts/diff-findings.py \
            --repo "$TARGET_REPO" \
            --original-sidecar "$ORIG_SIDECAR" \
            --reaudit-sidecar "$RE_SIDECAR" \
            --registry auditor/registry/repos.json \
            --commit-sha-before "$COMMIT_SHA_BEFORE" \
            --commit-sha-after "$COMMIT_SHA_AFTER" \
            --events-out auditor/logs/events.jsonl \
            --diff-report-out "$DIFF_REPORT" \
            --summary-out "$SUMMARY" \
            "${ORIG_SCORE_ARG[@]}" \
            "${RE_SCORE_ARG[@]}"

          # Copy re-audit evidence into /tmp/evidence/ so the writer prompt
          # reads them alongside the original audit materials.
          cp "$RE_REPORT" /tmp/evidence/re-audit-report.md 2>/dev/null || \
            echo "No re-audit report" > /tmp/evidence/re-audit-report.md
          cp "$DIFF_REPORT" /tmp/evidence/re-audit-diff.md 2>/dev/null || \
            echo "No diff" > /tmp/evidence/re-audit-diff.md
          cp "$SUMMARY" /tmp/evidence/re-audit-summary.json 2>/dev/null || \
            echo "{}" > /tmp/evidence/re-audit-summary.json

          # Signal to the writer prompt that re-audit evidence is present.
          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "=== re-audit summary ==="
          cat "$SUMMARY"

      - name: Re-audit — skipped (still signal to writer prompt)
        # Fires in two cases: (1) reclone step decided to skip (no original
        # sidecar, no original findings, target unreachable), or (2) the
        # scoring action failed (timeout, auth, prompt echo). In either
        # case the writer prompt needs stub evidence files to branch on so
        # the article omits the Re-Audit section honestly instead of
        # fabricating one from stale or partial data.
        if: steps.skipcheck.outputs.skip != 'true' && (steps.reclone.outputs.skip == 'true' || steps.rescore.outcome != 'success')
        env:
          RECLONE_SKIP: ${{ steps.reclone.outputs.skip }}
          RECLONE_REASON: ${{ steps.reclone.outputs.skip_reason }}
          RESCORE_OUTCOME: ${{ steps.rescore.outcome }}
        run: |
          if [ "$RECLONE_SKIP" = "true" ]; then
            REASON="$RECLONE_REASON"
          else
            REASON="rescore_${RESCORE_OUTCOME}"
          fi
          echo "{\"skipped\": true, \"reason\": \"$REASON\"}" > /tmp/evidence/re-audit-summary.json
          echo "Re-audit skipped — reason: $REASON" > /tmp/evidence/re-audit-report.md
          echo "Re-audit skipped — reason: $REASON" > /tmp/evidence/re-audit-diff.md

      - name: Worthiness check
        # Case-study generation is expensive: multi-pass Claude calls
        # (write + self-review + apply-fixes + verify-facts + polish +
        # link-validate + mermaid-validate) plus a DALL-E image. ~$1-2
        # in API calls and 20+ min runtime per article. Auto-generating
        # for every audited repo means the corpus dilutes — same
        # "audit found bug, maintainer fixed it" arc told 50 times.
        #
        # Gate: only write a full case study when something narratively
        # distinct happened. Otherwise close the issue with a brief
        # summary comment + `no-narrative` label and keep the audit
        # data (already on disk under auditor/audits/<slug>.md). The
        # finding_verified events from the re-audit step still emit
        # regardless — rule-health metrics aren't affected.
        #
        # Worthy criteria (any one triggers full case study):
        #   1. security: BLOCKED (disclosure pattern)
        #   2. rule_adopted: true (maintainer went beyond the PR)
        #   3. >=3 PRs applied_separately (substantive cluster)
        #   4. >=1 merged AND >=1 applied_separately (mixed-outcome
        #      teaching case)
        #   5. score < 70 (genuine quality story)
        #
        # Otherwise: close cleanly with summary comment.
        id: worthiness
        if: steps.skipcheck.outputs.skip != 'true'
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          python3 - "$TARGET_REPO" <<'PYEOF' >> "$GITHUB_OUTPUT"
          import json, sys
          repo = sys.argv[1]
          d = json.load(open('auditor/registry/repos.json'))
          r = d['repos'].get(repo, {})
          prs = r.get('prs') or []
          merged = sum(1 for p in prs if p.get('outcome') == 'merged')
          applied = sum(1 for p in prs if p.get('outcome') == 'applied_separately')
          rejected = sum(1 for p in prs if p.get('outcome') == 'rejected')
          score = r.get('score') or 100
          security = r.get('security') or 'UNKNOWN'
          rule_adopted = bool(r.get('rule_adopted'))

          worthy = False
          reason = ''
          if security == 'BLOCKED':
              worthy = True
              reason = 'security:BLOCKED disclosure pattern'
          elif rule_adopted:
              worthy = True
              reason = 'rule_adopted=true — maintainer went beyond PRs'
          elif applied >= 3:
              worthy = True
              reason = f'{applied} applied_separately PRs — substantive cluster'
          elif merged >= 1 and applied >= 1:
              worthy = True
              reason = f'{merged} merged + {applied} applied_separately — mixed outcome'
          elif score < 70:
              worthy = True
              reason = f'score {score}/100 < 70 — quality story'
          else:
              reason = (f'thin narrative: score={score}, security={security}, '
                       f'merged={merged}, applied_separately={applied}, '
                       f'rejected={rejected}, rule_adopted={rule_adopted}')

          # Output for subsequent step gating + the close-issue summary.
          print(f"worthy={'true' if worthy else 'false'}")
          print(f"reason<<EOF\n{reason}\nEOF")

          # Stderr trace for log readability.
          import sys as _sys
          print(f"[worthiness] repo={repo} worthy={worthy} reason={reason}", file=_sys.stderr)
          PYEOF

      - name: No-narrative — close issue with summary
        # Fires when the worthiness gate said no. Closes the tracking
        # issue cleanly with a brief comment, applies the `no-narrative`
        # label, updates the registry status to `complete`. Audit data
        # at auditor/audits/<slug>.md stays as-is — it's the source of
        # truth even when no article gets generated.
        if: |
          steps.skipcheck.outputs.skip != 'true' &&
          steps.worthiness.outputs.worthy == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          TARGET_REPO: ${{ steps.target.outputs.repo }}
          ISSUE_NUM: ${{ steps.target.outputs.issue }}
          REASON: ${{ steps.worthiness.outputs.reason }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          source auditor/scripts/log-event.sh

          # Comment on the audit issue.
          cat > /tmp/no-narrative.md <<EOF
          ## Case study skipped — no narrative

          Worthiness gate decided this repo doesn't merit a full case
          study. The audit data is still on disk and feeds rule-health
          metrics. Reason:

          > $REASON

          To override and generate a full case study anyway:
          \`\`\`
          gh workflow run "Write Case Study" -R xiaolai/nlpm \\
            -f repo=$TARGET_REPO -f issue_number=$ISSUE_NUM -f force_rewrite=true
          \`\`\`
          (Force-rewrite bypasses the gate.)

          Audit report: \`auditor/audits/${SLUG}.md\`
          EOF
          gh issue comment "$ISSUE_NUM" --body-file /tmp/no-narrative.md 2>/dev/null || true
          gh issue edit "$ISSUE_NUM" --add-label "no-narrative,complete" --remove-label "case-study-ready" 2>/dev/null || true
          gh issue close "$ISSUE_NUM" --reason completed 2>/dev/null || true

          # Mark registry status complete + log the skip.
          jq --arg name "$TARGET_REPO" '.repos[$name].status = "complete" | .repos[$name].case_study_skipped = true | .repos[$name].case_study_skip_reason = $reason' \
             --arg reason "$REASON" \
             auditor/registry/repos.json > /tmp/reg.json \
             && bash auditor/scripts/atomic-registry-write.sh

          log_event "case-study" "no_narrative" "$(jq -cn --arg repo "$TARGET_REPO" --arg reason "$REASON" '{repo: $repo, reason: $reason}')" || true

          # Commit the registry + event via bot PR.
          git add auditor/registry/repos.json auditor/logs/events.jsonl
          bash auditor/scripts/guard-protected-paths.sh || exit 1
          bash auditor/scripts/commit-via-pr.sh "case-study: $TARGET_REPO — no narrative ($REASON)"

      - name: Compute write_article gate
        # Folds skipcheck + worthiness into a single output that every
        # downstream "writing" step gates on. Avoids sprinkling
        # `&& worthiness.outputs.worthy != 'false'` into a dozen ifs.
        id: gate
        run: |
          if [ "${{ steps.skipcheck.outputs.skip }}" = "true" ]; then
            echo "write_article=false" >> "$GITHUB_OUTPUT"
            echo "Gate: skipping (case study already exists)"
          elif [ "${{ steps.worthiness.outputs.worthy }}" = "false" ]; then
            echo "write_article=false" >> "$GITHUB_OUTPUT"
            echo "Gate: skipping (worthiness check failed)"
          else
            echo "write_article=true" >> "$GITHUB_OUTPUT"
            echo "Gate: proceeding to write article"
          fi

      - name: Prepare case study prompt
        if: steps.gate.outputs.write_article == 'true'
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"

          # The writer prompt branches on whether the re-audit actually ran.
          # When re-audit evidence is present, the article gets a dedicated
          # "The Re-Audit" section with numeric before/after verification.
          # When it's absent, the article omits the section rather than
          # faking it — honesty beats completeness.
          RE_AUDIT_SKIPPED=$(jq -r '.skipped // false' /tmp/evidence/re-audit-summary.json 2>/dev/null || echo "true")

          if [ "$RE_AUDIT_SKIPPED" = "false" ]; then
            RE_AUDIT_SECTION_GUIDANCE=$(cat <<'GUIDANCE_EOF'
          7. **The Re-Audit** — Post-merge verification.
             - Open with one sentence framing: a rubric update is a claim;
               the re-audit verifies the claim against the target repo's
               current HEAD.
             - Pull before/after scores and commit SHAs from
               /tmp/evidence/re-audit-summary.json.
             - Render the per-finding outcome table directly from
               /tmp/evidence/re-audit-diff.md (outcome column is load-bearing —
               reproduce its wording verbatim, do not paraphrase).
             - If any findings were introduced since audit (summary.json
               introduced_count > 0), add a short subsection explaining:
               these may be true regressions from maintainer commits, OR
               scoring drift from the model. Name both possibilities; do
               not assign blame.
             - Close with one sentence measuring what the diff actually
               proved: "X of Y original findings verified fixed; Z still
               persist" — numbers only, no editorializing.
          GUIDANCE_EOF
          )
            RE_AUDIT_TIMELINE_GUIDANCE='- Timeline gantt MUST include a Verify section with a "Re-audit at HEAD" task — mirrors the mirror-test case study'
            RE_AUDIT_LIMITATIONS_GUIDANCE='- Add to Limitations: what the re-audit does NOT prove (e.g., "the re-audit measures file-level quality at one point in time; it does not verify that maintainer intent aligns with our rule set")'
          else
            RE_AUDIT_SECTION_GUIDANCE="          (Re-audit was skipped — do NOT write a 'The Re-Audit' section. Renumber subsequent sections accordingly.)"
            RE_AUDIT_TIMELINE_GUIDANCE='- Timeline gantt — no Verify section this run (re-audit was skipped)'
            RE_AUDIT_LIMITATIONS_GUIDANCE='- Add to Limitations: "Post-merge re-audit was skipped for this engagement; before/after quality change is not independently verified."'
          fi

          cat > /tmp/case-study-prompt.md <<PROMPT_EOF
          You are writing a case study article about an NLPM audit engagement.

          ## Source Material

          All evidence is in /tmp/evidence/ — read EVERY file:
          - repo.json: target repo metadata
          - owner.json: repo owner profile
          - prs.json: all PRs we submitted (with URLs)
          - issues.json: tracking issues we created
          - commits.json: commits mentioning NLPM or Claude
          - pr-*-reviews.json: maintainer review comments
          - audit-report.md: the full NLPM scoring report (original audit)
          - re-audit-report.md: the post-merge re-score at target HEAD
            (or a "skipped" stub if re-audit did not run)
          - re-audit-diff.md: per-finding verification table (outcomes:
            fixed_and_merged / fixed_applied_separately /
            fixed_upstream_not_merged / persists_identically /
            persists_line_shifted; plus introduced findings)
          - re-audit-summary.json: structured before/after counts and
            scores. The \`skipped\` field tells you whether the Re-Audit
            section is warranted for this engagement.

          ## Article Template

          Write to: case-studies/$SLUG.md

          Structure:
          1. **Title** — creative, hints at what was learned
          2. **Disclosure** — mandatory blockquote:
             > **Disclosure**: This article was generated by an automated pipeline using Claude (Sonnet 4.6) based on audit data and GitHub records. It describes work performed by NLPM tooling maintained by [xiaolai](https://github.com/xiaolai). Readers should weigh claims accordingly.
          3. **The Project** — what it is, who maintains it (link owner profile), star count (once)
          4. **The Audit** — overall score, distribution (mermaid pie chart), top issues, fair assessment
          5. **What Was Submitted** — each PR with GitHub URL, title, fix description
          6. **The Response** — maintainer reaction from review comments and commits
          ${RE_AUDIT_SECTION_GUIDANCE}
          8. **What the Audit Revealed** — patterns with fairness note
          9. **Timeline** — mermaid gantt chart from PR/issue timestamps
          10. **Limitations** — what this doesn't prove
          11. **Significance** — measured, not inflated

          ## Style Rules (first draft)
          - Write clean, factual prose first — ornate wording comes in the polish pass
          - ALL links from evidence files — never fabricate URLs
          - ALL numbers from evidence files — never guess
          - If evidence is missing for a section, say so honestly

          ## Mermaid Diagram Requirements
          - Score distribution: mermaid pie chart
          - Timeline: mermaid gantt chart (dateFormat YYYY-MM-DD HH:mm, axisFormat %H:%M)
          ${RE_AUDIT_TIMELINE_GUIDANCE}
          - PR priority grouping: mermaid graph LR with colored subgraphs if 3+ priority tiers
          - Parallel/sequential failure: mermaid sequenceDiagram if applicable
          - Find ANY data that would be clearer as a diagram than a table — use mermaid
          - Do NOT use ASCII art or text-based diagrams — always mermaid

          ## Limitations guidance
          ${RE_AUDIT_LIMITATIONS_GUIDANCE}

          ## Also write
          - /tmp/case-study-summary.txt: one-line summary for the issue comment
          PROMPT_EOF

      - name: Write with Claude Code
        if: steps.skipcheck.outputs.skip != 'true' && steps.gate.outputs.write_article == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "github-actions[bot],nlpm-auditor[bot]"
          prompt: "Read the prompt file at /tmp/case-study-prompt.md and follow all instructions in it."
          # Defense-in-depth: case-study reads target-repo content while
          # holding git push perms. Block network-exfil Bash channels +
          # WebFetch/WebSearch. See AUTH-LEAK.md.
          claude_args: |
            --allowedTools Read,Glob,Grep,Write,Bash
            --disallowedTools "Bash(curl:*)" "Bash(wget:*)" "Bash(nc:*)" "Bash(ncat:*)" "Bash(socat:*)" "Bash(telnet:*)" "Bash(ssh:*)" "Bash(scp:*)" "Bash(sftp:*)" "Bash(rsync:*)" WebFetch WebSearch

      # ================================================================
      # STEP A: Self-Review — 6 perspectives (replaces external Codex review)
      # ================================================================
      - name: Prepare self-review prompt
        if: steps.skipcheck.outputs.skip != 'true' && steps.gate.outputs.write_article == 'true'
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          cat > /tmp/self-review-prompt.md <<'REVIEW_EOF'
          You are a critical reviewer. Read the case study draft and evaluate it from 6 perspectives.
          Write your findings to /tmp/review-findings.md.

          Read the article at case-studies/SLUG_PLACEHOLDER.md

          ## Perspective 1: Technical Accuracy
          - Are claims about YAML behavior, Claude Code runtime, and scoring correct?
          - Do penalty values match NLPM's actual rubric?
          - Are PR descriptions technically sound?

          ## Perspective 2: Narrative Structure
          - Does the story flow logically?
          - Are there pacing problems — sections that drag or rush?
          - Is there a timing/math inconsistency anywhere?

          ## Perspective 3: Journalistic Integrity
          - Are there claims not substantiated by the evidence files?
          - Is the maintainer's perspective fairly represented?
          - Are failures given appropriate weight vs successes?

          ## Perspective 4: Marketing Bias
          - Does it read as an NLPM ad disguised as a case study?
          - Are metrics cherry-picked or selectively presented?
          - Is the significance oversold?

          ## Perspective 5: Missing Context
          - What would a maintainer want readers to know that's not here?
          - Is there fairness context about the project's development pace?

          ## Perspective 6: Counterarguments
          - Could any "defects" be intentional design choices?
          - Are NLPM's rules themselves debatable here?
          - Is the score framed more negatively than warranted?

          ## Output Format

          Write to /tmp/review-findings.md:

          For each perspective:
          ### Perspective N: Name
          | # | Severity | Finding | Recommendation |
          |---|----------|---------|----------------|

          Then:
          ### Top 5 Issues (by credibility impact)
          ### Strengths
          REVIEW_EOF

          sed -i "s/SLUG_PLACEHOLDER/$SLUG/g" /tmp/self-review-prompt.md 2>/dev/null || \
          sed -i '' "s/SLUG_PLACEHOLDER/$SLUG/g" /tmp/self-review-prompt.md

      - name: Self-review with Claude Code
        if: steps.skipcheck.outputs.skip != 'true' && steps.gate.outputs.write_article == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "github-actions[bot],nlpm-auditor[bot]"
          prompt: "Read the prompt file at /tmp/self-review-prompt.md and follow all instructions in it."
          claude_args: "--allowedTools Read,Glob,Grep,Write"

      # ================================================================
      # STEP B: Apply review fixes
      # ================================================================
      - name: Prepare fix prompt
        if: steps.skipcheck.outputs.skip != 'true' && steps.gate.outputs.write_article == 'true'
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          cat > /tmp/apply-fixes-prompt.md <<FIXES_EOF
          You are an editor. Read the review findings at /tmp/review-findings.md and the article at case-studies/$SLUG.md.

          Apply fixes for every HIGH and CRITICAL finding. For MEDIUM findings, apply if the fix is clear.

          ## Fix categories

          **Technical accuracy**: correct any factual errors. Cross-check against /tmp/evidence/*.json.
          **Timing errors**: verify all timestamps against PR/issue creation dates in /tmp/evidence/prs.json and /tmp/evidence/issues.json.
          **Missing name: nuance**: if the article claims missing name: is a "guaranteed crash", soften to "non-canonical, portability concern" — Claude Code may fall back to filename.
          **Scalar-string tools:**: if flagged as a bug, reframe as convention preference and note NLPM v0.7.0 accepts both formats.
          **Score framing**: if 74/100 (or similar) is framed negatively, add that it passes the default 70 threshold.
          **Missing fairness note**: if absent, add one acknowledging the project's development pace and quality orientation.
          **Missing disclosure**: if the disclosure blockquote is absent, add it.
          **Missing limitations section**: if absent, add one with 3-4 caveats.
          **Oversold significance**: tone down if the closing is too strong.

          ## Rules
          - Use Edit tool — surgical fixes, not rewrites
          - Do NOT change mermaid blocks
          - Do NOT remove content that's accurate
          - Do NOT add new sections beyond what the review recommends
          FIXES_EOF

      - name: Apply fixes with Claude Code
        if: steps.skipcheck.outputs.skip != 'true' && steps.gate.outputs.write_article == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "github-actions[bot],nlpm-auditor[bot]"
          prompt: "Read the prompt file at /tmp/apply-fixes-prompt.md and follow all instructions in it."
          claude_args: "--allowedTools Read,Edit,Grep"

      # ================================================================
      # STEP C: Verify facts against GitHub API
      # ================================================================
      - name: Verify facts
        if: steps.skipcheck.outputs.skip != 'true' && steps.gate.outputs.write_article == 'true'
        id: factcheck
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          ARTICLE="case-studies/${SLUG}.md"
          ERRORS=0

          if [ ! -f "$ARTICLE" ]; then
            echo "No article — skipping fact check"
            exit 0
          fi

          echo "=== Fact-checking $ARTICLE ==="
          : > /tmp/fact-check-errors.txt   # truncate the error file

          # Check 1: Verify all GitHub PR/issue links resolve
          grep -oP 'https://github\.com/[^/]+/[^/]+/(pull|issues)/\d+' "$ARTICLE" | sort -u | while read -r url; do
            TYPE=$(echo "$url" | grep -oP '(pull|issues)')
            NUM=$(echo "$url" | grep -oP '\d+$')
            API_REPO=$(echo "$url" | sed 's|https://github.com/||' | sed 's|/pull/.*||' | sed 's|/issues/.*||')

            if [ "$TYPE" = "pull" ]; then
              STATUS=$(gh pr view "$NUM" --repo "$API_REPO" --json state --jq '.state' 2>/dev/null || echo "NOT_FOUND")
            else
              STATUS=$(gh issue view "$NUM" --repo "$API_REPO" --json state --jq '.state' 2>/dev/null || echo "NOT_FOUND")
            fi

            if [ "$STATUS" = "NOT_FOUND" ]; then
              echo "BROKEN LINK: $url" | tee -a /tmp/fact-check-errors.txt
              ERRORS=$((ERRORS + 1))
            else
              echo "OK: $url ($STATUS)"
            fi
            sleep 0.5
          done

          # Check 2: Verify commit links
          grep -oP 'https://github\.com/[^/]+/[^/]+/commit/[a-f0-9]+' "$ARTICLE" | sort -u | while read -r url; do
            SHA=$(echo "$url" | grep -oP '[a-f0-9]+$')
            API_REPO=$(echo "$url" | sed 's|https://github.com/||' | sed 's|/commit/.*||')
            STATUS=$(gh api "repos/$API_REPO/commits/$SHA" --jq '.sha' 2>/dev/null || echo "NOT_FOUND")

            if [ "$STATUS" = "NOT_FOUND" ]; then
              echo "BROKEN COMMIT LINK: $url" | tee -a /tmp/fact-check-errors.txt
              ERRORS=$((ERRORS + 1))
            else
              echo "OK: $url"
            fi
            sleep 0.5
          done

          # Check 3: Verify repo links
          grep -oP 'https://github\.com/[a-zA-Z0-9_-]+/[a-zA-Z0-9_-]+(?=\))' "$ARTICLE" | sort -u | while read -r url; do
            REPO_NAME=$(echo "$url" | sed 's|https://github.com/||')
            # Skip if it's a PR/issue/commit link (already checked)
            echo "$REPO_NAME" | grep -qP '(pull|issues|commit)' && continue
            STATUS=$(gh api "repos/$REPO_NAME" --jq '.full_name' 2>/dev/null || echo "NOT_FOUND")

            if [ "$STATUS" = "NOT_FOUND" ]; then
              echo "BROKEN REPO LINK: $url" | tee -a /tmp/fact-check-errors.txt
              ERRORS=$((ERRORS + 1))
            else
              echo "OK: $url"
            fi
            sleep 0.5
          done

          if [ -s /tmp/fact-check-errors.txt ]; then
            echo ""
            echo "=== FACT CHECK FAILURES ==="
            cat /tmp/fact-check-errors.txt
            echo "Errors will be fixed in next step"
          else
            echo ""
            echo "=== All facts verified ==="
          fi

          echo "has_errors=$([ -s /tmp/fact-check-errors.txt ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Fix broken links (if any)
        if: steps.skipcheck.outputs.skip != 'true' && steps.factcheck.outputs.has_errors == 'true' && steps.gate.outputs.write_article == 'true'
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          if [ ! -s /tmp/fact-check-errors.txt ]; then
            echo "No fact-check errors — skipping"
            exit 0
          fi

          SLUG="${TARGET_REPO//\//-}"
          cat > /tmp/fix-links-prompt.md <<LINKS_EOF
          Broken links were found in the article.
          Read /tmp/fact-check-errors.txt for the list.
          Read the article at case-studies/$SLUG.md.

          For each broken link:
          - If it's a wrong PR/issue number: check /tmp/evidence/prs.json and issues.json for the correct number
          - If it's a wrong repo path: check /tmp/evidence/repo.json for the correct name
          - If it's a wrong commit SHA: check /tmp/evidence/commits.json for the correct SHA
          - If the link simply doesn't exist: remove the link but keep the text

          Use Edit tool for surgical fixes only.
          LINKS_EOF

      - name: Fix links with Claude Code
        if: steps.skipcheck.outputs.skip != 'true' && steps.factcheck.outputs.has_errors == 'true' && steps.gate.outputs.write_article == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "github-actions[bot],nlpm-auditor[bot]"
          prompt: "Read the prompt file at /tmp/fix-links-prompt.md and follow all instructions in it."
          claude_args: "--allowedTools Read,Edit,Grep"

      # ================================================================
      # STEP D: Polish prose — ornate wording
      # ================================================================
      - name: Prepare polish prompt
        if: steps.skipcheck.outputs.skip != 'true' && steps.gate.outputs.write_article == 'true'
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          # Prompt body extracted to auditor/prompts/polish-case-study.md
          # in v0.8.10 (was 101 lines of literal markdown in a YAML
          # heredoc — easier to edit and review as a standalone file).
          cp auditor/prompts/polish-case-study.md /tmp/polish-prompt.md

      - name: Polish with Claude Code
        if: steps.skipcheck.outputs.skip != 'true' && steps.gate.outputs.write_article == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "github-actions[bot],nlpm-auditor[bot]"
          prompt: "Read the prompt file at /tmp/polish-prompt.md and follow all instructions in it."
          claude_args: "--allowedTools Read,Edit,Grep"

      # ================================================================
      # STEP E: Validate all links (final pass after polish)
      # ================================================================
      - name: Final link validation
        if: steps.skipcheck.outputs.skip != 'true' && steps.gate.outputs.write_article == 'true'
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          ARTICLE="case-studies/${SLUG}.md"

          [ ! -f "$ARTICLE" ] && exit 0

          # Check for bare #NNNN references that should be linked
          BARE=$(grep -nP '[^[(]#\d{4}' "$ARTICLE" || true)
          if [ -n "$BARE" ]; then
            echo "WARNING: Bare issue/PR references found (should be linked):"
            echo "$BARE"
          fi

          # Count GitHub links as a sanity check
          LINK_COUNT=$(grep -c 'https://github.com/' "$ARTICLE" || true)
          LINK_COUNT=${LINK_COUNT:-0}
          echo "Total GitHub links: $LINK_COUNT"

          # Check for duplicate consecutive links (common polish artifact)
          grep -nP '(\[.*?\]\(https://github\.com/[^)]+\)).*\1' "$ARTICLE" && echo "WARNING: Duplicate links found" || echo "No duplicate links"

      # ================================================================
      # STEP F: Validate mermaid syntax
      # ================================================================
      - name: Validate mermaid syntax
        if: steps.skipcheck.outputs.skip != 'true' && steps.gate.outputs.write_article == 'true'
        id: mermaid_check
        continue-on-error: true
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          ARTICLE="case-studies/${SLUG}.md"

          [ ! -f "$ARTICLE" ] && { echo "No article — skipping"; exit 0; }

          python3 << 'PYEOF'
          import re, sys, os

          slug = os.environ.get("TARGET_REPO", "").replace("/", "-")
          path = f"case-studies/{slug}.md"

          with open(path) as f:
              content = f.read()

          blocks = re.findall(r'```mermaid\n(.*?)```', content, re.DOTALL)

          if not blocks:
              print("No mermaid blocks found")
              sys.exit(0)

          print(f"Found {len(blocks)} mermaid block(s)")
          errors = []

          for i, block in enumerate(blocks):
              b = block.strip()
              first = b.split('\n')[0].strip()

              valid = ['graph ', 'flowchart ', 'sequenceDiagram', 'classDiagram',
                       'stateDiagram', 'erDiagram', 'gantt', 'pie ', 'pie\n',
                       'journey', 'gitGraph', 'mindmap', 'timeline',
                       'quadrantChart', 'xychart', 'sankey', 'block']

              if not any(first.startswith(s) or first == s.strip() for s in valid):
                  errors.append(f"Block {i+1}: unrecognized type '{first}'")
                  continue

              if first == 'gantt':
                  if 'dateFormat' not in b: errors.append(f"Block {i+1} (gantt): missing dateFormat")
                  if 'section' not in b: errors.append(f"Block {i+1} (gantt): missing section")

              if first.startswith('pie'):
                  for line in [l.strip() for l in b.split('\n')[1:] if l.strip()]:
                      if line.startswith('"') and ':' not in line:
                          errors.append(f"Block {i+1} (pie): malformed '{line}'")

              if first == 'sequenceDiagram':
                  if 'participant' not in b and '->>' not in b:
                      errors.append(f"Block {i+1} (sequence): no participants or messages")

              if first.startswith(('graph', 'flowchart')):
                  if '-->' not in b and '---' not in b:
                      errors.append(f"Block {i+1} (graph): no edges")

              print(f"Block {i+1} ({first}): OK")

          if errors:
              print(f"\n{len(errors)} ERROR(S):")
              for e in errors: print(f"  - {e}")
              with open('/tmp/mermaid-errors.txt', 'w') as f:
                  f.write('\n'.join(errors))
              sys.exit(1)
          else:
              print("\nAll mermaid blocks valid")
          PYEOF

      - name: Fix mermaid errors (if any)
        if: steps.skipcheck.outputs.skip != 'true' && steps.mermaid_check.outcome == 'failure' && steps.gate.outputs.write_article == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "github-actions[bot],nlpm-auditor[bot]"
          prompt: |
            Mermaid syntax errors were found. Read /tmp/mermaid-errors.txt.
            Fix each broken block in the article. Common fixes:
            - gantt: dateFormat YYYY-MM-DD HH:mm, axisFormat %H:%M
            - pie: "label" : value format
            - graph: edges use -->
            - sequenceDiagram: declare participants
            Do NOT change non-mermaid content.
          claude_args: "--allowedTools Read,Edit,Grep"

      - name: Generate and compress cover image
        if: steps.skipcheck.outputs.skip != 'true' && steps.gate.outputs.write_article == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          DATE=$(date +%Y-%m-%d)
          mkdir -p case-studies/images

          # Generate via DALL-E. Capture both stdout (response JSON) and
          # the HTTP status separately so we can surface the actual
          # failure mode instead of silently dropping it. The previous
          # `2>/dev/null` plus python that exits 0 on missing-data swallowed
          # API errors entirely — kubesphere + code-yeongyu both had
          # cover-gen "succeed" in 0.3 seconds with no diagnostic on
          # 2026-05-06 to -07. Likely root cause: OPENAI_API_KEY auth
          # or quota. Make it visible.
          API_RESP=/tmp/openai-resp.json
          API_HTTP=/tmp/openai-http.txt
          curl -sS https://api.openai.com/v1/images/generations \
            -o "$API_RESP" \
            -w '%{http_code}' \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d '{
              "model": "gpt-image-1",
              "prompt": "Minimalist editorial illustration in warm amber and deep navy. A magnifying glass over code on an open book. Two figures reviewing work together collaboratively. No text, no logos. Style: The New Yorker meets a tech blog. 16:9.",
              "n": 1,
              "size": "1536x1024",
              "quality": "high"
            }' > "$API_HTTP" || true
          HTTP_CODE=$(cat "$API_HTTP" 2>/dev/null || echo "000")
          echo "OpenAI image API HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Cover image generation failed — HTTP $HTTP_CODE."
            # Print first 500 chars of response so the failure mode (auth /
            # quota / billing / model-not-found / content policy) is
            # diagnosable from the workflow log without re-running.
            echo "Response body (first 500 chars):"
            head -c 500 "$API_RESP" 2>/dev/null || echo "  (no response body)"
            echo ""
          else
            python3 - "$API_RESP" <<'PYEOF' || echo "Cover image generation failed — could not extract image from response"
          import sys, json, base64
          path = sys.argv[1]
          with open(path) as f:
              data = json.load(f)
          if 'data' in data and data['data']:
              img = data['data'][0]
              if 'b64_json' in img:
                  with open('/tmp/cover-raw.png', 'wb') as f:
                      f.write(base64.b64decode(img['b64_json']))
                  print('saved')
              else:
                  print('Cover image generation failed — response had no b64_json')
          else:
              print('Cover image generation failed — response had no data field')
              print(json.dumps(data)[:500])
          PYEOF
          fi

          # Convert PNG to WebP (cwebp first, fall back to PIL, fall back to raw PNG copy).
          # WebP at q=85 averages ~7-11% of original PNG size on the
          # editorial-illustration cover style we use; a 17-cover backfill
          # on 2026-05-07 went 50.8MB → 4.2MB (92% smaller). Storage on
          # GitHub is the constraint — these images live in the repo and
          # are served via raw.githubusercontent.com on every article view.
          IMG_DEST="case-studies/images/${DATE}-${SLUG}-cover.webp"
          if [ -f /tmp/cover-raw.png ]; then
            if command -v cwebp &>/dev/null; then
              cwebp -quiet -q 85 /tmp/cover-raw.png -o "$IMG_DEST" && echo "Compressed with cwebp (q=85)"
            elif python3 -c "from PIL import Image" 2>/dev/null; then
              python3 -c "
          from PIL import Image
          img = Image.open('/tmp/cover-raw.png')
          img.save('${IMG_DEST}', 'WebP', quality=85, method=6)
          " 2>/dev/null && echo "Compressed with PIL to WebP (q=85)"
            else
              # Last-resort fallback: keep the raw PNG. Article reference
              # uses .webp by convention; rename the destination to .png
              # so the file/article extension match.
              IMG_DEST="${IMG_DEST%.webp}.png"
              cp /tmp/cover-raw.png "$IMG_DEST" && echo "WARN: no WebP encoder — raw PNG copy"
            fi

            RAW_SIZE=$(stat -f%z /tmp/cover-raw.png 2>/dev/null || stat -c%s /tmp/cover-raw.png 2>/dev/null || echo "?")
            FINAL_SIZE=$(stat -f%z "$IMG_DEST" 2>/dev/null || stat -c%s "$IMG_DEST" 2>/dev/null || echo "?")
            echo "Image: $RAW_SIZE -> $FINAL_SIZE bytes"
          fi

          # Rename article with date prefix
          OLD_ARTICLE="case-studies/${SLUG}.md"
          NEW_ARTICLE="case-studies/${DATE}-${SLUG}.md"
          if [ -f "$OLD_ARTICLE" ]; then
            mv "$OLD_ARTICLE" "$NEW_ARTICLE"
          fi

          # Insert image reference after title
          IMG_BASENAME=$(basename "$IMG_DEST")
          if [ -f "$IMG_DEST" ] && [ -f "$NEW_ARTICLE" ]; then
            python3 << PYEOF
          import re, os
          article = "${NEW_ARTICLE}"
          img_ref = "images/${IMG_BASENAME}"
          with open(article) as f:
              content = f.read()
          content = re.sub(r'^(# .+)$', r'\1\n\n![Cover](' + img_ref + ')', content, count=1, flags=re.MULTILINE)
          with open(article, 'w') as f:
              f.write(content)
          PYEOF
          fi

      - name: Log, commit, and close
        # Runs on the "wrote an article" path AND on the existing-case-study
        # skip path. The skip-path used to be unreachable: the previous gate
        # `if: steps.gate.outputs.write_article == 'true'` excluded skipcheck=true
        # because gate sets write_article=false when SKIP=true. The new gate
        # explicitly allows either condition so the skip-close path actually
        # runs and closes the issue cleanly.
        if: steps.gate.outputs.write_article == 'true' || steps.skipcheck.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          TARGET_REPO: ${{ steps.target.outputs.repo }}
          ISSUE_NUM: ${{ steps.target.outputs.issue }}
          SKIP: ${{ steps.skipcheck.outputs.skip }}
        run: |
          # Skip path: case study already existed — just close the issue cleanly.
          if [ "$SKIP" = "true" ]; then
            echo "Skip path: a prior case study exists; closing issue without regenerating."
            if [ "$ISSUE_NUM" != "null" ] && [ "$ISSUE_NUM" != "0" ]; then
              gh issue edit "$ISSUE_NUM" --add-label "complete" --remove-label "case-study-ready" 2>/dev/null || true
              gh issue close "$ISSUE_NUM" --reason completed 2>/dev/null || true
            fi
            exit 0
          fi

          SLUG="${TARGET_REPO//\//-}"
          DATE=$(date +%Y-%m-%d)

          source auditor/scripts/log-event.sh

          ARTICLE="case-studies/${DATE}-${SLUG}.md"
          LINES=0
          [ -f "$ARTICLE" ] && LINES=$(wc -l < "$ARTICLE" | tr -d ' ')
          HAS_IMAGE=$([ -f "case-studies/images/${DATE}-${SLUG}-cover.webp" ] || [ -f "case-studies/images/${DATE}-${SLUG}-cover.png" ] || [ -f "case-studies/images/${DATE}-${SLUG}-cover.jpg" ] && echo true || echo false)

          log_event "case-study" "published" "{\"repo\": \"$TARGET_REPO\", \"article_lines\": $LINES, \"has_cover\": $HAS_IMAGE}"

          # Stage the case study + re-audit artifacts written earlier in
          # this run (.re-audit.md, .re-audit.findings.jsonl,
          # .re-audit.diff.md) and the appended finding_verified /
          # finding_introduced events.
          git add case-studies/ auditor/logs/events.jsonl auditor/audits/
          bash auditor/scripts/guard-protected-paths.sh || exit 1
          bash auditor/scripts/commit-via-pr.sh "case-study: $TARGET_REPO ($LINES lines)"

          # Update registry
          jq --arg name "$TARGET_REPO" --arg cs "case-studies/${DATE}-${SLUG}.md" \
             '.repos[$name].status = "complete" | .repos[$name].case_study = $cs' \
             auditor/registry/repos.json > /tmp/reg.json \
             && bash auditor/scripts/atomic-registry-write.sh

          git add auditor/registry/repos.json
          bash auditor/scripts/guard-protected-paths.sh || exit 1
          bash auditor/scripts/commit-via-pr.sh "chore: mark $TARGET_REPO complete"

          # Comment and close issue
          SUMMARY="Case study published"
          [ -f /tmp/case-study-summary.txt ] && SUMMARY=$(cat /tmp/case-study-summary.txt)

          gh issue comment "$ISSUE_NUM" \
            --body "Case study published: [case-studies/${DATE}-${SLUG}.md](case-studies/${DATE}-${SLUG}.md) — ${SUMMARY}" \
            2>/dev/null || true
          gh issue edit "$ISSUE_NUM" --add-label "complete" --remove-label "case-study-ready" 2>/dev/null || true
          gh issue close "$ISSUE_NUM" --reason completed 2>/dev/null || true

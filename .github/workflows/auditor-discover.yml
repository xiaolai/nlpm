name: Discover Claude Code Repos

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview results without creating issues'
        type: boolean
        default: false
      min_stars:
        description: 'Minimum star count'
        type: number
        default: 500
      max_age_days:
        description: 'Skip repos with no push within this many days (freshness gate)'
        type: number
        default: 180
      min_artifacts:
        description: 'Minimum NL artifact count to be worthy'
        type: number
        default: 5
      max_artifacts:
        description: 'Maximum NL artifact count (above this, repo is likely generated/mirrored)'
        type: number
        default: 100

permissions:
  contents: write
  issues: write

concurrency:
  group: nlpm-discover
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Search GitHub for Claude Code repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MIN_STARS: ${{ inputs.min_stars || 500 }}
          MAX_AGE_DAYS: ${{ inputs.max_age_days || 180 }}
        run: |
          echo "Searching for Claude Code plugin and skill repos..."
          echo "  min_stars=$MIN_STARS  max_age_days=$MAX_AGE_DAYS"

          # Compute the freshness cutoff once. Repos with updatedAt earlier
          # than this are dropped — they're either abandoned or done, and a
          # PR is unlikely to land in either case.
          FRESH_CUTOFF=$(date -u -d "$MAX_AGE_DAYS days ago" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
                       || date -u -v"-${MAX_AGE_DAYS}d" +%Y-%m-%dT%H:%M:%SZ)
          echo "  freshness cutoff: $FRESH_CUTOFF (skip repos with updatedAt < this)"

          RESULTS_FILE=$(mktemp)
          echo "[]" > "$RESULTS_FILE"

          for query in \
            "claude code plugin in:name,description language:Markdown" \
            "claude code skill in:name,description language:Markdown" \
            "claude-plugin in:name language:Markdown" \
            ".claude-plugin plugin.json in:path" \
            '"program.md" autonomous in:description'; do
            # The last query targets "agent workflow program" repos —
            # project-root program.md driving an autonomous agent loop
            # (canonical example: karpathy/autoresearch). The probe step
            # below now matches program.md as an artifact path, so these
            # surface alongside Claude plugin repos. Caveat: most agent-
            # workflow-program repos have a SINGLE artifact (program.md),
            # which is below the default MIN_ARTIFACTS=5 floor — a
            # manual run with `min_artifacts: 1` is the path to audit
            # them today. A per-repo-type floor is deferred until N≥3
            # examples justify the floor-policy redesign.

            gh search repos "$query" \
              --sort stars \
              --limit 50 \
              --json fullName,stargazersCount,updatedAt,description,isArchived \
              --jq "[.[]
                    | select(.stargazersCount >= ($MIN_STARS | tonumber))
                    | select(.isArchived == false)
                    | select(.updatedAt > \"$FRESH_CUTOFF\")]" \
              2>/dev/null >> "$RESULTS_FILE" || true
            sleep 2
          done

          jq -s 'add | group_by(.fullName) | map(max_by(.stargazersCount))' "$RESULTS_FILE" > /tmp/gh_candidates.json
          echo "GH-search candidates: $(jq length /tmp/gh_candidates.json)"

      - name: Apply vendor-default filter
        # Drops repos whose owner is on the no-external-PRs list
        # (anthropics/*) or the CLA-required list (google-*/* without
        # signed-commit identity). The contribute workflow's policy
        # gates catch the same cases LATE, after the audit cost has
        # been paid — filtering at discovery time saves that cost.
        run: |
          jq -c '.[]' /tmp/gh_candidates.json \
            | python3 auditor/scripts/vendor_default_filter.py --report \
            > /tmp/candidates_filtered.jsonl
          jq -s '.' /tmp/candidates_filtered.jsonl > /tmp/candidates.json
          echo "After vendor filter: $(jq length /tmp/candidates.json)"

      - name: Filter against registry + published case studies
        run: |
          # The registry is the primary dedup source, but pre-pipeline
          # engagements (e.g., gsd-build/get-shit-done audited on
          # 2026-04-06 before this pipeline shipped) live in case-studies/
          # without a registry entry. Mining the case-study markdown for
          # cited repo URLs catches those — without this guard, the topic
          # search re-flagged a repo whose case study was already published.
          # Build a deny list of "owner/name" strings cited in any case study,
          # then dedup candidates against (registry ∪ case-study citations).
          {
            grep -ohE 'https://github\.com/[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+' \
              case-studies/*.md 2>/dev/null \
              | sed 's|https://github.com/||;s|\.git$||' \
              | grep -vE '^(xiaolai/nlpm|xiaolai/nlpm-for-claude|xiaolai/claude-plugin-marketplace)$' \
              || true
          } | sort -u > /tmp/case_study_repos.txt
          echo "case-study-cited repos: $(wc -l < /tmp/case_study_repos.txt | tr -d ' ')"

          jq --slurpfile registry auditor/registry/repos.json \
             --rawfile cs_list /tmp/case_study_repos.txt '
            ($cs_list | split("\n") | map(select(length > 0))) as $cs_set
            | [.[] | select(.fullName as $name |
                (($registry[0].repos | has($name)) | not) and
                (($cs_set | index($name)) == null)
              )]
          ' /tmp/candidates.json > /tmp/new_candidates.json
          echo "New repos (post registry + case-study filter): $(jq length /tmp/new_candidates.json)"

      - name: Probe repos for NL artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MIN_ARTIFACTS: ${{ inputs.min_artifacts || 5 }}
          MAX_ARTIFACTS: ${{ inputs.max_artifacts || 100 }}
        run: |
          echo "Probe range: $MIN_ARTIFACTS <= artifacts <= $MAX_ARTIFACTS"
          echo "[]" > /tmp/worthy.json
          : > /tmp/worthy_raw.jsonl   # truncate
          : > /tmp/oversized.jsonl    # truncate

          jq -c '.[]' /tmp/new_candidates.json | while read -r repo; do
            FULL_NAME=$(echo "$repo" | jq -r '.fullName')
            STARS=$(echo "$repo" | jq -r '.stargazersCount')
            echo "Probing $FULL_NAME ($STARS stars)..."

            # Path patterns for NL artifacts. The canonical Claude Code
            # paths are listed first, followed by emerging conventions
            # observed in the wild (multi-tool agent skills using
            # AGENTS.md, repos with skill files at non-canonical layouts).
            # The 2026-04-29 audit of safishamsi/graphify (37k stars, 13
            # artifacts at `graphify/skill*.md` + AGENTS.md) was the
            # forcing function — the previous probe returned 0 for that
            # repo and silently dropped it from the queue.
            ARTIFACT_COUNT=$(gh api "repos/$FULL_NAME/git/trees/HEAD?recursive=1" \
              --jq '[.tree[].path | select(
                # Canonical Claude Code layouts
                test("agents/.*\\.md$") or
                test("commands/.*\\.md$") or
                test("skills/.*/SKILL\\.md$") or
                test("\\.claude-plugin/plugin\\.json$") or
                test("\\.claude/commands/.*\\.md$") or
                test("\\.claude/agents/.*\\.md$") or
                test("\\.claude/skills/.*/SKILL\\.md$") or
                # Multi-tool agent spec (becoming a standard for
                # cross-assistant skill repos)
                test("^AGENTS\\.md$") or
                # Agent workflow program (project-root .md driving an
                # autonomous agent loop — karpathy/autoresearch style).
                # See nlpm:conventions §2 + the karpathy-autoresearch
                # exemplar. Typically a single-artifact repo, so will
                # only pass the MIN_ARTIFACTS floor on manual runs with
                # `min_artifacts: 1`.
                test("^program\\.md$") or
                # Non-canonical skill layouts seen in real-world repos
                test("^[^/]+/skill\\.md$") or
                test("^[^/]+/skill-[^/]+\\.md$") or
                test("^[^/]+/SKILL\\.md$") or
                # MCP / hooks at non-canonical paths
                test("^\\.mcp\\.json$") or
                test("hooks/hooks\\.json$")
              )] | length' 2>/dev/null || echo "0")

            if [ "$ARTIFACT_COUNT" -lt "$MIN_ARTIFACTS" ]; then
              echo "  -> $ARTIFACT_COUNT artifacts — skipping (below floor)"
            elif [ "$ARTIFACT_COUNT" -gt "$MAX_ARTIFACTS" ]; then
              # Oversized repos are usually generated, mirrored, or scraped —
              # not curated plugins. Audit cost scales with artifact count, so
              # we skip rather than burn LLM cycles. Recorded for review in
              # case a legitimate large repo (rare) needs an explicit override.
              echo "  -> $ARTIFACT_COUNT artifacts — skipping (above ceiling, likely generated/mirrored)"
              echo "$repo" | jq --argjson count "$ARTIFACT_COUNT" '. + {artifact_count: $count, skip_reason: "above_artifact_ceiling"}' >> /tmp/oversized.jsonl
            else
              echo "  -> $ARTIFACT_COUNT artifacts — worthy"
              echo "$repo" | jq --argjson count "$ARTIFACT_COUNT" '. + {artifact_count: $count}' >> /tmp/worthy_raw.jsonl
            fi
            sleep 1
          done

          if [ -s /tmp/worthy_raw.jsonl ]; then
            jq -s '.' /tmp/worthy_raw.jsonl > /tmp/worthy.json
          fi
          OVERSIZED=$(wc -l < /tmp/oversized.jsonl | tr -d ' ')
          echo "Worthy repos (in-range): $(jq length /tmp/worthy.json)"
          echo "Skipped (above ceiling): $OVERSIZED"
          if [ "$OVERSIZED" -gt 0 ]; then
            echo "Oversized repos for manual review:"
            jq -r '"  - \(.fullName) (\(.stargazersCount) stars, \(.artifact_count) artifacts)"' /tmp/oversized.jsonl
          fi

      - name: Update registry and create issues
        if: inputs.dry_run != true && inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          jq -c '.[]' /tmp/worthy.json | while read -r repo; do
            FULL_NAME=$(echo "$repo" | jq -r '.fullName')
            STARS=$(echo "$repo" | jq -r '.stargazersCount')
            ARTIFACTS=$(echo "$repo" | jq -r '.artifact_count')
            DESC=$(echo "$repo" | jq -r '.description // "No description"')

            # Create issue using a tempfile for body (avoids injection)
            BODY_FILE=$(mktemp)
            cat > "$BODY_FILE" <<ISSUE_BODY
          ## Repo

          https://github.com/$FULL_NAME

          | Field | Value |
          |-------|-------|
          | Stars | $STARS |
          | NL Artifacts | $ARTIFACTS |

          ### Next Steps

          1. Review the repo — check CONTRIBUTING.md, recent activity, PR history
          2. If worthy: add label \`audit-ready\` to trigger the audit workflow
          3. If not: close this issue

          ### Checklist

          - [ ] Accepts contributions
          - [ ] Updated in last 60 days
          - [ ] Not a fork or mirror
          - [ ] Has meaningful NL artifacts
          ISSUE_BODY

            # Only update the registry if issue creation succeeded. The
            # previous flow created an issue with `|| echo ""`, parsed the
            # potentially-empty URL into `audit_issue: 0`, then recorded
            # the repo as `discovered` — making it INELIGIBLE for future
            # retry (because the registry now claims we already handled
            # it). Now: explicit failure path that skips the registry
            # write and lets the next discover cycle re-attempt.
            if ! ISSUE_URL=$(gh issue create \
                --title "Audit candidate: $FULL_NAME" \
                --label "audit-candidate" \
                --body-file "$BODY_FILE"); then
              echo "WARN: gh issue create failed for $FULL_NAME — skipping registry write so the next discover cycle can retry" >&2
              rm -f "$BODY_FILE"
              continue
            fi

            ISSUE_NUM=$(echo "$ISSUE_URL" | grep -o '[0-9]*$' || echo "0")
            if [ "$ISSUE_NUM" = "0" ]; then
              echo "WARN: gh issue create returned URL without parseable number ($ISSUE_URL); skipping registry write" >&2
              rm -f "$BODY_FILE"
              continue
            fi
            echo "Created issue #$ISSUE_NUM for $FULL_NAME"
            rm -f "$BODY_FILE"

            # Update registry (atomic via the standard validate+rename helper)
            jq --arg name "$FULL_NAME" \
               --arg now "$NOW" \
               --argjson stars "$STARS" \
               --argjson artifacts "$ARTIFACTS" \
               --arg desc "$DESC" \
               --argjson issue "$ISSUE_NUM" \
               '.repos[$name] = {
                  discovered: $now, stars: $stars, artifacts: $artifacts,
                  description: $desc, status: "discovered",
                  score: null, audit_issue: $issue, prs: []
                } | .metadata.total_discovered += 1 | .metadata.last_discovery = $now' \
               auditor/registry/repos.json > /tmp/reg.json \
               && bash auditor/scripts/atomic-registry-write.sh

            sleep 2
          done

      - name: Log and commit
        if: inputs.dry_run != true && inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source auditor/scripts/log-event.sh

          CANDIDATES=$(jq length /tmp/candidates.json 2>/dev/null || echo 0)
          NEW=$(jq length /tmp/new_candidates.json 2>/dev/null || echo 0)
          WORTHY=$(jq length /tmp/worthy.json 2>/dev/null || echo 0)
          OVERSIZED=$(wc -l < /tmp/oversized.jsonl 2>/dev/null | tr -d ' ' || echo 0)

          log_event "discover" "search_complete" "{\"candidates\": $CANDIDATES, \"new\": $NEW, \"worthy\": $WORTHY, \"oversized\": $OVERSIZED}"

          git config user.name "nlpm-auditor[bot]"
          git config user.email "nlpm-auditor[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add auditor/registry/repos.json auditor/logs/events.jsonl
          bash auditor/scripts/guard-protected-paths.sh || exit 1
          git diff --cached --quiet || {
            git commit -m "chore: discovery $(date +%Y-%m-%d) — $WORTHY new repos"
            bash auditor/scripts/git-push-with-retry.sh
          }

      - name: Summary
        run: |
          CANDIDATES=$(jq length /tmp/candidates.json 2>/dev/null || echo 0)
          NEW=$(jq length /tmp/new_candidates.json 2>/dev/null || echo 0)
          WORTHY=$(jq length /tmp/worthy.json 2>/dev/null || echo 0)
          OVERSIZED=$(wc -l < /tmp/oversized.jsonl 2>/dev/null | tr -d ' ' || echo 0)
          MIN_ART=${{ inputs.min_artifacts || 5 }}
          MAX_ART=${{ inputs.max_artifacts || 100 }}
          MIN_STARS=${{ inputs.min_stars || 500 }}
          MAX_AGE=${{ inputs.max_age_days || 180 }}
          {
            echo "## Discovery Summary"
            echo ""
            echo "Gates: stars ≥ $MIN_STARS, pushed within $MAX_AGE days, $MIN_ART ≤ artifacts ≤ $MAX_ART."
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Candidates (post freshness gate) | $CANDIDATES |"
            echo "| New (post registry/case-study dedup) | $NEW |"
            echo "| Worthy (in artifact range) | $WORTHY |"
            echo "| Oversized (above ceiling, skipped) | $OVERSIZED |"
            echo ""
            if [ -f /tmp/worthy.json ] && [ "$WORTHY" -gt 0 ]; then
              echo "### Worthy Repos"
              echo ""
              echo "| Repo | Stars | Artifacts |"
              echo "|------|-------|-----------|"
              jq -r '.[] | "| \(.fullName) | \(.stargazersCount) | \(.artifact_count) |"' /tmp/worthy.json
            fi
            if [ "$OVERSIZED" -gt 0 ]; then
              echo ""
              echo "### Oversized — manual review only"
              echo ""
              echo "| Repo | Stars | Artifacts |"
              echo "|------|-------|-----------|"
              jq -r '"| \(.fullName) | \(.stargazersCount) | \(.artifact_count) |"' /tmp/oversized.jsonl
            fi
          } >> "$GITHUB_STEP_SUMMARY"

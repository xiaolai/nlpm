name: nlpm-self-check

# Dogfoods bin/nlpm-check on this repo and keeps nlpm-badge.json fresh.
# This is the self-check; the template adopters use is at
# templates/workflows/nlpm-check.yml.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'auditor/**'
      - 'case-studies/**'
      - 'nlpm-badge.json'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  self-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Python unittest suite
        run: python3 -m unittest discover -s tests -v

      - name: Run nlpm-check (deterministic dogfood)
        run: |
          set +e
          ./bin/nlpm-check --json . > /tmp/nlpm-result.json
          CHECK_EXIT=$?
          ./bin/nlpm-check . || true
          exit $CHECK_EXIT

      - name: Refresh badge on push to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && always()
        run: |
          if [ ! -f /tmp/nlpm-result.json ]; then
            echo "No result JSON; skipping badge regeneration."
            exit 0
          fi
          ./bin/nlpm-badge < /tmp/nlpm-result.json > nlpm-badge.json
          if git diff --quiet nlpm-badge.json; then
            echo "nlpm-badge.json unchanged; nothing to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add nlpm-badge.json
          git commit -m "chore: refresh nlpm-badge.json"
          bash auditor/scripts/git-push-with-retry.sh

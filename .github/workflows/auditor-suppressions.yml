name: Downstream Suppressions Scan

# Weekly scan of public GitHub repos for committed NLPM configs that suppress
# or override rules. Each override becomes a `downstream_suppression` event
# in auditor/disagreements.jsonl, so rule-refinement tooling can see where the
# community disagrees with NLPM rules.

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly, Sunday 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nlpm-suppressions
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install yaml parser
        run: |
          python3 -m pip install --quiet pyyaml

      - name: Search GitHub for committed NLPM configs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Logic extracted to auditor/scripts/scan-suppressions.py in v0.8.10.
          # The previous inline 110-line bash block mixed gh-api shell calls
          # with jq, sha256sum, base64, and per-item python invocations of
          # parse-suppressions.py. Python with subprocess does it all in one
          # process tree and is directly testable.
          SUMMARY=$(python3 auditor/scripts/scan-suppressions.py)
          echo "$SUMMARY"

          # Surface search failure as a discrete event so the daily report
          # can flag incomplete scans.
          SEARCH_OK=$(echo "$SUMMARY" | python3 -c "import json,sys;print(json.load(sys.stdin).get('search_ok',True))")
          if [ "$SEARCH_OK" = "False" ]; then
            source auditor/scripts/log-event.sh
            log_event "suppressions" "search_failed" \
              '{"reason": "gh api search returned non-zero — partial or empty results"}'
          fi

          source auditor/scripts/log-event.sh
          log_event "suppressions" "scan_complete" "$SUMMARY" || true

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "nlpm-auditor[bot]"
          git config user.email "nlpm-auditor[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add auditor/disagreements.jsonl auditor/logs/events.jsonl
          bash auditor/scripts/guard-protected-paths.sh || exit 1
          git diff --cached --quiet || {
            git commit -m "suppressions: $(date +%Y-%m-%d) scan"
            bash auditor/scripts/git-push-with-retry.sh
          }

name: Daily Report

on:
  schedule:
    - cron: '0 22 * * *'  # Daily 22:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # daily report commits report file to repo
  issues: read      # read-only — counts open issues by label; no creation/edit needed

concurrency:
  group: nlpm-daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          persist-credentials: false

      - name: Collect pipeline state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/report

          # Registry stats
          jq '{
            total: (.repos | length),
            by_status: (.repos | to_entries | group_by(.value.status) | map({(.[0].value.status): length}) | add),
            case_study_candidates: [.repos | to_entries[] | select(.value.case_study_candidate == true) | .key],
            top_by_stars: [.repos | to_entries | sort_by(-(.value.stars // 0)) | .[:5][] | {repo: .key, stars: (.value.stars // 0), status: .value.status}]
          }' auditor/registry/repos.json > /tmp/report/registry-stats.json

          # Issue counts by label
          COUNTS="{}"
          for label in audit-candidate audit-ready audit-complete contribute-approved prs-submitted case-study-ready complete; do
            COUNT=$(gh issue list --label "$label" --state open --json number --jq 'length' 2>/dev/null || echo 0)
            COUNTS=$(echo "$COUNTS" | jq --arg l "$label" --argjson c "$COUNT" '. + {($l): $c}')
          done
          echo "$COUNTS" > /tmp/report/issue-counts.json

          # Recent activity (last 24h)
          YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-1d +%Y-%m-%dT%H:%M:%SZ)
          gh issue list --state all --json number,title,state,createdAt,closedAt,labels \
            --jq "[.[] | select(.createdAt > \"$YESTERDAY\" or (.closedAt // \"\" | . > \"$YESTERDAY\"))]" \
            > /tmp/report/recent-activity.json 2>/dev/null || echo "[]" > /tmp/report/recent-activity.json

          # PR tracking — read from registry (track workflow populates .prs)
          jq '[.repos | to_entries[] | select(.value.prs != null and (.value.prs | length) > 0) | .value.prs[] + {repo: .key}]' \
            auditor/registry/repos.json > /tmp/report/pr-updates.json 2>/dev/null || echo "[]" > /tmp/report/pr-updates.json

      - name: Collect feedback signals
        run: |
          python3 auditor/scripts/rule-health.py /tmp/report/feedback-summary.json

      - name: Generate report
        # Embed Python via quoted heredoc so shell never expands $vars or
        # interprets the f-string braces inside the script.
        # shellcheck-in-actionlint can't see past the heredoc to know it's
        # Python, so it parses the Python f-strings as bash brace
        # expressions and emits SC1054/SC1056/SC1072/SC1073/SC1083/SC1009
        # false positives. Disable those codes for this step.
        # shellcheck disable=SC1009,SC1054,SC1056,SC1072,SC1073,SC1083
        run: |
          mkdir -p auditor/reports

          # The Python script computes its own date via datetime — no
          # bash DATE var is needed (and the quoted heredoc wouldn't
          # see it anyway).
          python3 << 'PYEOF'
          import json
          from datetime import datetime

          date = datetime.utcnow().strftime('%Y-%m-%d')

          def load(path, default):
              try:
                  with open(path) as f: return json.load(f)
              except: return default

          reg = load('/tmp/report/registry-stats.json', {})
          issues = load('/tmp/report/issue-counts.json', {})
          activity = load('/tmp/report/recent-activity.json', [])
          fb = load('/tmp/report/feedback-summary.json', {})

          L = []
          L.append(f"# Daily Report: {date}\n")

          # Pipeline
          L.append("## Pipeline\n")
          L.append("| Stage | Count |")
          L.append("|-------|-------|")
          by_s = reg.get('by_status') or {}
          for s in ['discovered', 'audited', 'contributed', 'tracked', 'complete']:
              L.append(f"| {s} | {by_s.get(s, 0)} |")
          L.append(f"| **total** | **{reg.get('total', 0)}** |\n")

          # Open issues
          open_issues = {k: v for k, v in issues.items() if v > 0}
          if open_issues:
              L.append("## Awaiting Action\n")
              L.append("| Label | Count |")
              L.append("|-------|-------|")
              for label, count in sorted(open_issues.items()):
                  L.append(f"| \`{label}\` | {count} |")
              L.append("")

          # PR outcomes
          L.append("## PR Scorecard\n")
          L.append("| | Count |")
          L.append("|--------|-------|")
          L.append(f"| Submitted | {fb.get('prs_total', 0)} |")
          L.append(f"| Merged | {fb.get('prs_merged', 0)} |")
          L.append(f"| Applied separately | {fb.get('prs_applied_separately', 0)} |")
          L.append(f"| Rejected | {fb.get('prs_rejected', 0)} |")
          L.append(f"| Pending | {fb.get('prs_pending', 0)} |")
          L.append(f"| **Acceptance rate** (merged+applied / resolved) | **{fb.get('acceptance_rate', 'N/A')}** |")
          L.append(f"| Merge-only rate (merged / resolved) | {fb.get('merge_only_rate', 'N/A')} |\n")

          # Rule adoption — the rare, best outcome
          adopted = fb.get('rule_adopted_repos', [])
          if adopted:
              L.append("## Rule Adoption\n")
              L.append("*Repos where the maintainer went beyond merging our PRs — added systemic checks, backfilled siblings, or credited NLPM in their CHANGELOG.*\n")
              for r in adopted:
                  L.append(f"- {r}")
              L.append("")

          # Rule health distribution (SCHEMAS §Learning) — the pulse of the rubric
          states = fb.get('state_counts', {}) or {}
          dormant_n = fb.get('dormant_count', 0)
          if any(states.values()) or dormant_n > 0:
              L.append("## Rule Health\n")
              L.append("| State | Count | Meaning |")
              L.append("|-------|-------|---------|")
              L.append(f"| healthy | {states.get('healthy', 0)} | keeping as-is |")
              L.append(f"| noisy | {states.get('noisy', 0)} | high false-positive or low merge precision |")
              L.append(f"| disputed | {states.get('disputed', 0)} | maintainer pushback or downstream suppression |")
              L.append(f"| dormant | {dormant_n} | catalog rules with zero hits |")
              L.append("")

          # Top rules with their health state inline
          top = fb.get('top_rules', [])
          metrics = fb.get('rule_metrics', {}) or {}
          if top:
              L.append("## Rule Frequency\n")
              L.append("*Rules that fire most, with their current health state.*\n")
              L.append("| Rule | Hits | Merged | Self-FP | Rejected | Downstream | State |")
              L.append("|------|------|--------|---------|----------|------------|-------|")
              for rule, hits in top:
                  m = metrics.get(rule, {})
                  L.append(
                      f"| {rule} | {hits} | {m.get('merged', 0)} | {m.get('self_fp', 0)} | "
                      f"{m.get('maintainer_rejected', 0)} | {m.get('downstream_suppressions', 0)} | "
                      f"{m.get('state', '?')} |"
                  )
              L.append("")

          # Noisy rules — candidates for refinement
          noisy = [(rid, m) for rid, m in metrics.items() if m.get('state') == 'noisy']
          if noisy:
              L.append("## Noisy Rules — candidates for refinement\n")
              L.append("*High false-positive rate, or PRs not landing. Review what the rule missed.*\n")
              L.append("| Rule | Hits | Self-FP | Merged/Contributed |")
              L.append("|------|------|---------|---------------------|")
              for rid, m in sorted(noisy, key=lambda kv: -kv[1]['hits']):
                  L.append(
                      f"| {rid} | {m['hits']} | {m['self_fp']} | {m['merged']}/{m['contributed']} |"
                  )
              L.append("")

          # Disputed rules — external disagreement
          disputed = [(rid, m) for rid, m in metrics.items() if m.get('state') == 'disputed']
          if disputed:
              L.append("## Disputed Rules — external disagreement\n")
              L.append("*Maintainer pushback or downstream suppressions above threshold.*\n")
              L.append("| Rule | Hits | Maintainer-rejected | Downstream suppressions | Top dissent |")
              L.append("|------|------|--------------------|-------------------------|-------------|")
              for rid, m in sorted(disputed, key=lambda kv: -kv[1]['hits']):
                  dt = sorted(m.get('dissent_types', {}).items(), key=lambda kv: -kv[1])
                  top_dissent = dt[0][0] if dt else "—"
                  L.append(
                      f"| {rid} | {m['hits']} | {m['maintainer_rejected']} | "
                      f"{m['downstream_suppressions']} | {top_dissent} |"
                  )
              L.append("")

          # Unclassified rule_ids — namespace drift signal
          unclassified = fb.get('unclassified_ids', []) or []
          if unclassified:
              L.append("## Non-catalog rule IDs seen\n")
              L.append("*SEC-*, BUG-*, CC-* and UNCLASSIFIED findings. Recurring patterns may deserve a named catalog entry.*\n")
              for rid in unclassified[:20]:
                  m = metrics.get(rid, {})
                  L.append(f"- `{rid}` — {m.get('hits', 0)} hits ({m.get('state', '?')})")
              if len(unclassified) > 20:
                  L.append(f"- … and {len(unclassified) - 20} more")
              L.append("")

          # Activity
          if activity:
              L.append("## Today\n")
              for item in activity[:10]:
                  state = item.get('state', '?')
                  title = item.get('title', '?')
                  L.append(f"- [{state}] {title}")
              L.append("")

          # Self-evolution
          L.append("## Self-Evolution Signals\n")
          L.append("*What should feed back into NLPM itself.*\n")

          if top and len(top) >= 1:
              L.append(f"- **Hottest rule**: {top[0][0]} ({top[0][1]} hits) — earning its keep, or crying wolf?")
          noisy_n = states.get('noisy', 0)
          disputed_n = states.get('disputed', 0)
          if noisy_n > 0:
              L.append(f"- **{noisy_n} noisy rule(s)**: refinement candidates — reduce the false-positive rate or narrow the trigger")
          if disputed_n > 0:
              L.append(f"- **{disputed_n} disputed rule(s)**: external disagreement above threshold — revisit the principle, not just the phrasing")
          if dormant_n > 0 and dormant_n >= 10:
              L.append(f"- **{dormant_n} dormant rule(s)**: catalog rules never fired — re-scope or delete")
          rejected_n = fb.get('prs_rejected', 0)
          total_n = fb.get('prs_total', 0)
          if total_n > 0 and rejected_n > 0:
              L.append(f"- **Rejection rate {rejected_n}/{total_n}**: every 'no' is a rule that needs rethinking")
          merged_n = fb.get('prs_merged', 0)
          applied_n = fb.get('prs_applied_separately', 0)
          if merged_n > 0:
              L.append(f"- **{merged_n} merged**: these rules found real bugs — protect them")
          if applied_n > 0:
              L.append(f"- **{applied_n} applied separately**: PR closed but fix shipped in a later release — maintainer took the advice, just not the diff")
          adopted_n = len(fb.get('rule_adopted_repos', []))
          if adopted_n > 0:
              L.append(f"- **{adopted_n} rule-adopted**: maintainers went beyond the PR (systemic hardening, sibling-file backfill, CHANGELOG credit) — the best possible outcome; study what worked")
          if not top and rejected_n == 0 and merged_n == 0:
              L.append("- Pipeline needs more data — run discover.yml to start")
          L.append("")

          with open(f'auditor/reports/{date}.md', 'w') as f:
              f.write('\n'.join(L))
          print(f"Report: auditor/reports/{date}.md")
          PYEOF

      - name: Log and commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source auditor/scripts/log-event.sh

          TOTAL=$(jq '.repos | length' auditor/registry/repos.json)
          log_event "daily-report" "report_generated" "$(jq -cn --arg total "$TOTAL" '{total_repos: ($total | tonumber)}')" || true

          git config user.name "nlpm-auditor[bot]"
          git config user.email "nlpm-auditor[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add auditor/reports/ auditor/feedback/ auditor/logs/events.jsonl
          bash auditor/scripts/guard-protected-paths.sh || exit 1
          git diff --cached --quiet || {
            git commit -m "report: daily $(date +%Y-%m-%d)"

            for ATTEMPT in 1 2 3 4 5; do
              if git push 2>/dev/null; then break; fi
              echo "Push attempt $ATTEMPT failed, pulling..."
              git pull --no-rebase origin main --no-edit 2>/dev/null || true
              bash auditor/scripts/resolve-merge-conflicts.sh || true
              git diff --cached --quiet 2>/dev/null || git commit --no-edit 2>/dev/null || true
              [ "$ATTEMPT" -eq 5 ] && { echo "ERROR: push failed after 5 attempts"; exit 1; }
            done
          }

name: Write Exemplar

# Fires on `case-study-clean` label. Reads the existing audit report,
# clones the target at the audit commit SHA, and asks claude-code-action
# to write a teaching artifact under `auditor/exemplars/<slug>.md`.
#
# Distinct from `auditor-case-study.yml`, which writes a narrative
# article about a fix-PR outcome. This workflow exists for the
# always-clean path — repos with score ≥ 90 and no PR-worthy bugs.
# Without it, those repos would just sit in the registry as `audited`
# and never contribute back to NLPM's rule corpus.

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      repo:
        description: 'Target repo (owner/name)'
        required: true
      issue_number:
        description: 'Tracking issue number'
        required: true

permissions:
  contents: write
  issues: write
  id-token: write

concurrency:
  group: nlpm-exemplar-${{ github.event.inputs.repo || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  write:
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.label.name == 'case-study-clean')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          persist-credentials: false

      - name: Extract target
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_ISSUE: ${{ inputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "repo=$INPUT_REPO" >> "$GITHUB_OUTPUT"
            echo "issue=$INPUT_ISSUE" >> "$GITHUB_OUTPUT"
          else
            REPO=$(echo "$ISSUE_TITLE" | sed 's/Audit candidate: //')
            echo "repo=$REPO" >> "$GITHUB_OUTPUT"
            echo "issue=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve audit context
        id: ctx
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
        run: |
          SLUG="${TARGET_REPO//\//-}"
          AUDIT_REPORT="auditor/audits/${SLUG}.md"
          EXEMPLAR_PATH="auditor/exemplars/${SLUG}.md"

          if [ ! -f "$AUDIT_REPORT" ]; then
            echo "ERROR: no audit report at $AUDIT_REPORT — cannot write exemplar without prior audit"
            exit 1
          fi

          # Pull score, commit_sha from the registry. These are committed
          # by the audit workflow so they reflect the audited HEAD, not the
          # current HEAD of the target (which may have moved since audit).
          SCORE=$(jq -r --arg r "$TARGET_REPO" '.repos[$r].score // 0' auditor/registry/repos.json)
          COMMIT_SHA=$(jq -r --arg r "$TARGET_REPO" '.repos[$r].commit_sha_at_audit // "HEAD"' auditor/registry/repos.json)

          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "audit_report=$AUDIT_REPORT" >> "$GITHUB_OUTPUT"
          echo "exemplar_path=$EXEMPLAR_PATH" >> "$GITHUB_OUTPUT"
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

          echo "Audit report: $AUDIT_REPORT"
          echo "Score: $SCORE"
          echo "Commit SHA at audit: $COMMIT_SHA"

      - name: Clone target repo at audit commit
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
          COMMIT_SHA: ${{ steps.ctx.outputs.commit_sha }}
        run: |
          # Try to clone at the exact commit_sha if known; fall back to default branch.
          if [ "$COMMIT_SHA" != "HEAD" ] && [ "$COMMIT_SHA" != "unknown" ] && [ -n "$COMMIT_SHA" ]; then
            git clone "https://github.com/$TARGET_REPO.git" target-repo
            (cd target-repo && git checkout "$COMMIT_SHA" 2>/dev/null) || {
              echo "WARN: commit $COMMIT_SHA not reachable — using HEAD instead"
              (cd target-repo && git checkout -)
            }
          else
            git clone --depth 1 "https://github.com/$TARGET_REPO.git" target-repo
          fi
          echo "Cloned: $(cd target-repo && git rev-parse HEAD)"

      - name: Render exemplar prompt
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
          AUDIT_REPORT: ${{ steps.ctx.outputs.audit_report }}
          EXEMPLAR_PATH: ${{ steps.ctx.outputs.exemplar_path }}
          SCORE: ${{ steps.ctx.outputs.score }}
          COMMIT_SHA: ${{ steps.ctx.outputs.commit_sha }}
        run: |
          DATE_ISO=$(date -u +%Y-%m-%d)
          sed \
            -e "s|{{TARGET_REPO}}|${TARGET_REPO}|g" \
            -e "s|{{CLONE_DIR}}|target-repo|g" \
            -e "s|{{AUDIT_REPORT_PATH}}|${AUDIT_REPORT}|g" \
            -e "s|{{EXEMPLAR_PATH}}|${EXEMPLAR_PATH}|g" \
            -e "s|{{SCORE}}|${SCORE}|g" \
            -e "s|{{COMMIT_SHA}}|${COMMIT_SHA}|g" \
            -e "s|{{DATE_ISO}}|${DATE_ISO}|g" \
            auditor/prompts/write-exemplar.md > /tmp/exemplar-prompt.md
          echo "Rendered $(wc -l < /tmp/exemplar-prompt.md) lines"
          head -20 /tmp/exemplar-prompt.md

      - name: Write exemplar with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "github-actions[bot],nlpm-auditor[bot]"
          show_full_output: true
          claude_args: "--allowedTools Read,Glob,Grep,Write"
          prompt_file: /tmp/exemplar-prompt.md

      - name: Validate exemplar
        env:
          EXEMPLAR_PATH: ${{ steps.ctx.outputs.exemplar_path }}
        run: |
          if [ ! -f "$EXEMPLAR_PATH" ]; then
            echo "ERROR: exemplar not written at $EXEMPLAR_PATH"
            exit 1
          fi
          # Sanity-check the YAML frontmatter
          if ! head -1 "$EXEMPLAR_PATH" | grep -q '^---$'; then
            echo "ERROR: exemplar missing YAML frontmatter"
            cat "$EXEMPLAR_PATH" | head -10
            exit 1
          fi
          if ! grep -q '^exemplifies:' "$EXEMPLAR_PATH"; then
            echo "ERROR: exemplar missing 'exemplifies:' field in frontmatter"
            exit 1
          fi
          # Detect prompt echo
          if grep -q "Step 4: Hard rules for the output" "$EXEMPLAR_PATH"; then
            echo "ERROR: Claude echoed the prompt instead of writing the exemplar"
            rm -f "$EXEMPLAR_PATH"
            exit 1
          fi
          echo "Exemplar valid:"
          wc -l "$EXEMPLAR_PATH"
          head -15 "$EXEMPLAR_PATH"

      - name: Rebuild exemplar gallery
        # Regenerate auditor/exemplars/README.md so the gallery stays in
        # sync with the exemplars directory. Deterministic; no-op if
        # nothing changed.
        run: |
          python3 auditor/scripts/build-exemplar-gallery.py
          # Show the diff (informational; not gated)
          git diff --stat -- auditor/exemplars/README.md 2>/dev/null || true

      - name: Commit, update registry, close out
        env:
          TARGET_REPO: ${{ steps.target.outputs.repo }}
          ISSUE_NUM: ${{ steps.target.outputs.issue }}
          EXEMPLAR_PATH: ${{ steps.ctx.outputs.exemplar_path }}
          SCORE: ${{ steps.ctx.outputs.score }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source auditor/scripts/log-event.sh

          # Mark the registry entry as exemplar-published
          jq --arg name "$TARGET_REPO" \
             --arg path "$EXEMPLAR_PATH" \
             '.repos[$name] += {exemplar_published: true, exemplar_path: $path}' \
             auditor/registry/repos.json > /tmp/reg.json
          if ! bash auditor/scripts/atomic-registry-write.sh; then
            echo "ERROR: registry update failed validation"
            exit 1
          fi

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/$GITHUB_REPOSITORY.git"
          git config user.name "nlpm-auditor[bot]"
          git config user.email "nlpm-auditor[bot]@users.noreply.github.com"
          git add "$EXEMPLAR_PATH" auditor/exemplars/README.md auditor/registry/repos.json auditor/logs/events.jsonl
          bash auditor/scripts/guard-protected-paths.sh || exit 1
          git diff --cached --quiet || {
            git commit -m "exemplar: $TARGET_REPO (score $SCORE/100)"
            bash auditor/scripts/git-push-with-retry.sh 5
          }

          log_event "exemplar" "exemplar_published" "$(jq -cn \
            --arg repo "$TARGET_REPO" \
            --arg path "$EXEMPLAR_PATH" \
            --arg score "$SCORE" \
            '{repo: $repo, exemplar_path: $path, score: ($score | tonumber)}')" || true

          # Post on the audit issue (it's already closed, but the comment is searchable)
          REPORT_URL="https://github.com/${GITHUB_REPOSITORY}/blob/main/${EXEMPLAR_PATH}"
          {
            echo "## Exemplar published"
            echo ""
            echo "Score ${SCORE}/100 — added as a teaching artifact at \`${EXEMPLAR_PATH}\`."
            echo ""
            echo "Rules from \`skills/nlpm/rules/\` can now cite this repo as a positive real-world example."
            echo ""
            echo "[View exemplar](${REPORT_URL})"
          } > /tmp/comment.md
          gh issue comment "$ISSUE_NUM" --body-file /tmp/comment.md 2>/dev/null || true
          gh issue edit "$ISSUE_NUM" --add-label "exemplar-published" 2>/dev/null || true

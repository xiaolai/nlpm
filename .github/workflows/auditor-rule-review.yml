name: Quarterly Rule Review

# Quarterly check that NLPM's rules haven't drifted from reality.
# The doc-diff workflow (auditor-docs-diff.yml) catches Claude Code
# documentation changes, the classifier catches docs_citation events
# from maintainers, but neither catches:
#   - Rules that should have docs citations but don't
#   - Stale `last_verified` dates that nobody re-confirmed
#   - New Claude Code features (tools, hook events, fields) that
#     NLPM hasn't yet learned about
#   - Rules whose underlying premise nobody has questioned but
#     which may have aged out invisibly
#
# This workflow doesn't fix anything. It opens an issue with a
# review checklist on the 1st of every 3rd month. The maintainer
# acts on the checklist manually.

on:
  schedule:
    - cron: '0 9 1 1,4,7,10 *'  # 09:00 UTC on 1st of Jan/Apr/Jul/Oct
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: nlpm-rule-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Open quarterly review issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          QUARTER=$(date +%Y-Q$(( ($(date +%m) - 1) / 3 + 1 )))
          DATE=$(date +%Y-%m-%d)

          # Body generation extracted to auditor/scripts/generate-rule-review-body.py
          # in v0.8.10 (was 147 lines of mixed Python heredocs and bash
          # template assembly).
          python3 auditor/scripts/generate-rule-review-body.py "$QUARTER" "$DATE" \
            > /tmp/review-body.md

          # Dedupe: a quarterly cron can fire twice (manual + scheduled
          # in the same quarter) and would otherwise file two review
          # issues. Check for an existing open `rule-review` issue for
          # this exact quarter first.
          EXISTING=$(gh issue list \
            --label "rule-review" --state open \
            --search "in:title \"Quarterly Rule Review — ${QUARTER}\"" \
            --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Quarterly review issue for ${QUARTER} already exists: #$EXISTING"
            exit 0
          fi
          gh issue create \
            --title "Quarterly Rule Review — ${QUARTER}" \
            --label "rule-review" \
            --body-file /tmp/review-body.md

name: Docs Diff

# Weekly check that the Claude Code doc URLs cited in NLPM rules
# haven't changed. When a citation's underlying doc changes content,
# open an issue listing which rule files reference it so the
# maintainer can verify whether the rule is still correct.
#
# Reads:  auditor/docs-citations.json (citation index)
# Writes: auditor/docs-hashes.json    (hash store)
#
# Doesn't auto-update rules — that's load-bearing judgment that
# requires a human. This workflow only surfaces drift; the response
# is always a manual review of `last_verified` and the rule body.

on:
  schedule:
    - cron: '0 6 * * 2'  # Weekly Tuesday 06:00 UTC (off-peak vs other auditor crons)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: nlpm-docs-diff
  cancel-in-progress: false

jobs:
  diff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Fetch each cited URL, hash, compare
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Logic extracted to auditor/scripts/docs-diff.py in v0.8.10.
          # The previous inline shell mixed bash + Python + jq updates;
          # the Python script does it all in one language and is
          # directly testable.
          SUMMARY_JSON=$(python3 auditor/scripts/docs-diff.py)
          echo "$SUMMARY_JSON"

          CHANGED=$(echo "$SUMMARY_JSON" | python3 -c "import json,sys;print(json.load(sys.stdin)['changed'])")
          BOOTSTRAPPED=$(echo "$SUMMARY_JSON" | python3 -c "import json,sys;print(json.load(sys.stdin)['bootstrapped'])")
          UNCHANGED=$(echo "$SUMMARY_JSON" | python3 -c "import json,sys;print(json.load(sys.stdin)['unchanged'])")
          FETCH_FAILED=$(echo "$SUMMARY_JSON" | python3 -c "import json,sys;print(json.load(sys.stdin).get('fetch_failed',0))")

          echo "changed_count=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "bootstrapped=$BOOTSTRAPPED" >> "$GITHUB_OUTPUT"
          echo "unchanged=$UNCHANGED" >> "$GITHUB_OUTPUT"

          {
            echo "## Docs diff summary"
            echo ""
            echo "| Metric | Count |"
            echo "|---|---|"
            echo "| Changed URLs | $CHANGED |"
            echo "| Bootstrapped (first sight) | $BOOTSTRAPPED |"
            echo "| Unchanged | $UNCHANGED |"
            echo "| Fetch failed | $FETCH_FAILED |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open drift issue for each changed URL
        if: steps.diff.outputs.changed_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while IFS= read -r url; do
            [ -z "$url" ] && continue

            # Build issue body listing which rules cite this URL.
            python3 - "$url" <<'PYEOF' > /tmp/issue-body.md
          import json, sys
          url = sys.argv[1]
          d = json.load(open('auditor/docs-citations.json'))
          entry = d.get(url, {})
          rules = entry.get('rules', [])
          last_verified = entry.get('last_verified', 'unknown')
          print(f"## Doc drift detected: {url}")
          print()
          print(f"The hash of this URL changed since the last weekly check.")
          print(f"NLPM rules cite this doc; they may need re-validation.")
          print()
          print(f"**Last verified**: `{last_verified}`")
          print()
          print(f"### Rules referencing this URL")
          print()
          for r in rules:
              section = r.get('section', '?')
              quote = r.get('quote', '')
              refs = r.get('references', [])
              introduced = r.get('introduced_in', '')
              print(f"#### {section}")
              if quote:
                  print(f"> {quote}")
              print()
              print("Files referencing this:")
              for f in refs:
                  print(f"- `{f}`")
              if introduced:
                  print()
                  print(f"_Citation introduced in {introduced}._")
              print()
          print("### Action")
          print()
          print(f"1. Open <{url}> and review the section(s) above.")
          print(f"2. Confirm each `quote` still appears as written, or note what changed.")
          print(f"3. If the rule is still correct, update `last_verified` in `auditor/docs-citations.json` to today's date.")
          print(f"4. If the rule needs to change, update the referenced files and the citation index together.")
          print()
          print("---")
          print()
          print("_Filed automatically by `auditor-docs-diff.yml`._")
          PYEOF

            # Dedupe: don't open a second open drift issue for the same
            # URL. Search existing open `docs-drift` issues by title-prefix
            # match. If one exists, append a comment instead of creating
            # a duplicate.
            EXISTING_ISSUE=$(gh issue list \
              --label "docs-drift" --state open \
              --search "in:title \"Docs drift: $url\"" \
              --json number --jq '.[0].number // empty')
            if [ -n "$EXISTING_ISSUE" ]; then
              echo "Drift for $url already tracked in issue #$EXISTING_ISSUE; appending"
              gh issue comment "$EXISTING_ISSUE" --body-file /tmp/issue-body.md \
                || echo "WARN: comment append failed for #$EXISTING_ISSUE"
            else
              gh issue create \
                --title "Docs drift: $url" \
                --label "docs-drift" \
                --body-file /tmp/issue-body.md \
                || echo "WARN: issue create failed for $url"
            fi
          done < /tmp/changed-urls.txt

      - name: Commit hash store
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "nlpm-auditor[bot]"
          git config user.email "nlpm-auditor[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add auditor/docs-hashes.json
          git diff --cached --quiet || {
            git commit -m "docs-diff: $(date +%Y-%m-%d) — hash store update"
            for ATTEMPT in 1 2 3 4 5; do
              if git push 2>/dev/null; then break; fi
              git pull --no-rebase origin main --no-edit 2>/dev/null || true
              bash auditor/scripts/resolve-merge-conflicts.sh || true
              git diff --cached --quiet 2>/dev/null || git commit --no-edit 2>/dev/null || true
              [ "$ATTEMPT" -eq 5 ] && { echo "ERROR: push failed after 5 attempts"; exit 1; }
            done
          }
